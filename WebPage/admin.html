<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - The Boho Thread</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/product-images/TheBohoThreadFevicon Image.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/product-images/TheBohoThreadFevicon Image.png">
    <link rel="apple-touch-icon" href="/product-images/TheBohoThreadFevicon Image.png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin-specific styles */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #f1c40f;
        }

        .admin-actions {
            display: flex;
            gap: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card i {
            font-size: 2rem;
            color: #f1c40f;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .admin-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th,
        .admin-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-table th {
            background: rgba(241, 196, 15, 0.1);
            color: #f1c40f;
            font-weight: 600;
        }

        .admin-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .product-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .stock-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .stock-badge.in-stock {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .stock-badge.low-stock {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        .stock-badge.out-of-stock {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .edit-btn {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
        }

        .edit-btn:hover {
            background: #3498db;
            color: white;
        }

        .delete-btn {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .delete-btn:hover {
            background: #e74c3c;
            color: white;
        }

        /* Modal Styles */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .admin-modal.active {
            display: flex;
        }

        .admin-modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }

        .admin-modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-modal-header h2 {
            color: #f1c40f;
            font-family: 'Playfair Display', serif;
        }

        .admin-modal-body {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
        }

        .form-group select option {
            background: #1a1a2e;
            color: white;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #f1c40f;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .image-upload-area {
            border: 2px dashed rgba(241, 196, 15, 0.5);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-upload-area:hover {
            border-color: #f1c40f;
            background: rgba(241, 196, 15, 0.05);
        }

        .image-upload-area i {
            font-size: 3rem;
            color: #f1c40f;
            margin-bottom: 15px;
        }

        .image-upload-area p {
            color: rgba(255, 255, 255, 0.6);
        }

        .image-preview {
            margin-top: 15px;
            display: none;
        }

        .image-preview.active {
            display: block;
        }

        .image-preview img {
            max-width: 200px;
            border-radius: 10px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-container {
                padding: 80px 15px 30px;
            }

            .admin-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .admin-table {
                overflow-x: auto;
            }

            .admin-table table {
                min-width: 600px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">Admin Panel</div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Back to Store</a>
            </nav>
            <div class="header-actions">
                <span class="admin-user"><i class="fas fa-user-circle"></i> Admin</span>
                <button class="btn btn-secondary" onclick="logoutAdmin()" style="padding: 8px 20px; margin-left: 15px;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-cogs"></i> Product Management</h1>
            <div class="admin-actions">
                <button class="btn btn-primary" id="addProductBtn">
                    <i class="fas fa-plus"></i> Add Product
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-box"></i>
                <h3 id="totalProducts">0</h3>
                <p>Total Products</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <h3 id="inStockProducts">0</h3>
                <p>In Stock</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-exclamation-triangle"></i>
                <h3 id="lowStockProducts">0</h3>
                <p>Low Stock</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-shopping-cart"></i>
                <h3 id="totalOrders">0</h3>
                <p>Total Orders</p>
            </div>
        </div>

        <!-- Products Table -->
        <div class="admin-table">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>
                            
                        </th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <!-- Products will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="admin-modal" id="productModal">
        <div class="admin-modal-content">
            <div class="admin-modal-header">
                <h2 id="modalTitle">Add New Product</h2>
                <button class="close-modal" id="closeModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="admin-modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    
                    <div class="form-group">
                        <label>Product Image</label>
                        <div class="image-upload-area" id="imageUploadArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Click to upload or drag and drop</p>
                            <p style="font-size: 0.8rem; margin-top: 5px;">Supported: jpg, png, gif, webp</p>
                        </div>
                        <input type="file" id="productImageFile" accept="image/*" style="margin-top: 10px;">
                        <input type="text" id="productImage" placeholder="Or paste image URL here">
                        <div class="image-preview" id="imagePreview">
                            <img id="previewImg" src="" alt="Preview">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="productName" required placeholder="Enter product name">
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select id="productCategory" required>
                            <option value="">Select category</option>
                            <option value="jewelry">Jewelry</option>
                            <option value="clothing">Clothing</option>
                            <option value="home">Home Decor</option>
                            <option value="accessories">Accessories</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Actual Product MRP (₹)</label>
                        <input type="number" id="productPrice" required min="0" placeholder="Enter price">
                    </div>

                    <div class="form-group">
                        <label>Price After Discount (₹) - Optional</label>
                        <input type="number" id="productOriginalPrice" min="0" placeholder="Enter original price for showing discount">
                        <small style="color: rgba(255,255,255,0.5); font-size: 0.8rem;">Set this higher than price to show discount</small>
                    </div>

                    <div class="form-group">
                        <label>Product Badges</label>
                        <div id="badgeCheckboxes" style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px;">
                            <!-- Badges will be loaded dynamically from badges-config.js -->
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="productStock" required min="0" placeholder="Enter stock quantity">
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDescription" placeholder="Enter product description"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Product
                        </button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="badges-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
