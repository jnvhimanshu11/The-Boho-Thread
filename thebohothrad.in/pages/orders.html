<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — LUXE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700;900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/orders.css"/>
</head>
<body>
  <div class="ambient"><div class="amb-orb amb-orb-1"></div><div class="amb-orb amb-orb-2"></div></div>

  <nav class="navbar" id="navbar">
    <a href="../index.html" class="nav-logo">LUXE</a>
    <div class="nav-center">
      <a href="../index.html" class="nav-link">Shop</a>
      <a href="wishlist.html" class="nav-link">Wishlist</a>
      <a href="orders.html" class="nav-link active">My Orders</a>
    </div>
    <div class="nav-actions">
      <a href="../index.html" class="btn-ghost-sm">← Continue Shopping</a>
      <button class="icon-btn" id="cartBtn">
        🛒<span class="nav-badge" id="cartBadge">0</span>
      </button>
      <div class="nav-user-wrap">
        <div class="user-avatar-wrap" id="userAvatarWrap" style="display:none">
          <img src="" alt="User" class="user-avatar" id="userAvatar"/>
          <div class="user-dropdown">
            <div class="dropdown-name" id="dropdownName"></div>
            <div class="dropdown-email" id="dropdownEmail"></div>
            <div class="dropdown-divider"></div>
            <a href="orders.html" class="dropdown-item">📦 My Orders</a>
            <button class="dropdown-item" id="logoutBtn">🚪 Sign Out</button>
          </div>
        </div>
        <a href="login.html" class="btn-ghost-sm" id="loginNavBtn">Sign In</a>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="../index.html" class="mobile-link">Shop</a>
    <a href="wishlist.html" class="mobile-link">❤️ Wishlist</a>
    <a href="orders.html" class="mobile-link">📦 My Orders</a>
  </div>

  <div class="page-content">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">📦 My Orders</h1>
        <p id="orderSubtitle" style="color:var(--text-dim);margin-top:6px;font-size:0.9rem"></p>
      </div>

      <!-- Guest notice -->
      <div class="guest-notice" id="guestNotice" style="display:none">
        <div class="gn-icon">🔒</div>
        <h3>Sign in to view your orders</h3>
        <p>Your order history is linked to your account.</p>
        <a href="login.html" class="btn-gold" style="display:inline-flex;margin-top:16px">Sign In with Google →</a>
      </div>

      <div id="ordersList"></div>
    </div>
  </div>

  <!-- Cart panel -->
  <div class="panel-overlay" id="panelOverlay"></div>
  <aside class="side-panel" id="cartPanel">
    <div class="panel-head">
      <h3 class="panel-title">🛒 Your Cart</h3>
      <button class="panel-close" id="cartClose">✕</button>
    </div>
    <div class="panel-body" id="cartBody"></div>
    <div class="panel-foot" id="cartFoot"></div>
  </aside>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/store.js"></script>
  <script type="module" src="../js/auth.js"></script>
  <script type="module" src="../js/orders.js"></script>
</body>
</html>
