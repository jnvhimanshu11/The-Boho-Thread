<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Group — SplitMate</title>
<link rel="stylesheet" href="style.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.invite-wrap { max-width: 480px; width: 100%; text-align: center; }
.invite-icon { width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 20px; }
.invite-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 32px; }
.brand-top { font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; text-align: center; margin-bottom: 32px; }
.brand-top span { color: var(--accent2); }
.group-preview { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin: 20px 0; text-align: left; }
.member-avatars { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
.step-indicator { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
.step { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
.step.done { background: var(--green2); color: white; }
.step.active { background: var(--accent); color: white; }
.step.pending { background: var(--surface2); color: var(--text3); }
.step-line { height: 2px; width: 32px; background: var(--border); border-radius: 1px; }
</style>
</head>
<body>
<div class="invite-wrap">
  <div class="brand-top">Split<span>Mate</span></div>
  <div class="invite-card" id="invite-card">
    <div style="font-size:2rem;margin-bottom:12px">⏳</div>
    <p>Loading invitation...</p>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyCLz4cXKGxILS5Use2KPe4XaUnLRhcrIyg",
    authDomain:        "thebohothread-96e2c.firebaseapp.com",
    projectId:         "thebohothread-96e2c",
    storageBucket:     "thebohothread-96e2c.firebasestorage.app",
    messagingSenderId: "100688387088",
    appId:             "1:100688387088:web:f8a6af7565d3c25952fe95",
    measurementId:     "G-5VTK93354M"
  };
  firebase.initializeApp(firebaseConfig);
</script>
<script src="db.firestore.js"></script>
<script src="auth.js"></script>
<script>
  // ── JWT verify (same secret as group-detail.html) ─────────────────────────
  const JWT_SECRET = 'REPLACE_WITH_YOUR_OWN_SECRET_32CHARS'; // 🔑 must match!

  async function _jwtVerify(token) {
    try {
      const [h, p, s] = token.split('.');
      const msg  = h + '.' + p;
      const key  = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(JWT_SECRET),
        { name: 'HMAC', hash: 'SHA-256' }, false, ['verify']
      );
      const sigBytes = Uint8Array.from(atob(s.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0));
      const valid    = await crypto.subtle.verify('HMAC', key, sigBytes, new TextEncoder().encode(msg));
      if (!valid) return null;
      const payload  = JSON.parse(decodeURIComponent(escape(atob(p.replace(/-/g,'+').replace(/_/g,'/')))));  // Unicode-safe
      if (payload.exp < Date.now()) return null;
      return payload;
    } catch { return null; }
  }
</script>
<script>
const rawToken = new URLSearchParams(location.search).get('token');

async function render() {
  const card = document.getElementById('invite-card');

  if (!rawToken) {
    card.innerHTML = `
      <div style="font-size:2.5rem;margin-bottom:16px">❌</div>
      <h3>Invalid Invite Link</h3>
      <p style="margin:12px 0">This invitation link is not valid or has expired.</p>
      <a href="index.html" class="btn btn-primary btn-full mt-3">Go Home</a>`;
    return;
  }

  // ── Verify JWT signature + expiry ─────────────────────────────────────────
  const payload = await _jwtVerify(rawToken);
  if (!payload) {
    card.innerHTML = `
      <div style="font-size:2.5rem;margin-bottom:16px">⏰</div>
      <h3>Link Expired or Invalid</h3>
      <p style="margin:12px 0">This invite link has expired (valid 7 days) or the signature is invalid. Ask the group admin to resend.</p>
      <a href="index.html" class="btn btn-primary btn-full mt-3">Go Home</a>`;
    return;
  }

  const { groupId, invitedEmail, inviterName } = payload;

  // Check if already accepted
  const invDoc = await _fs().collection('invitations').doc(rawToken.slice(-20)).get();
  if (invDoc.exists && invDoc.data().status === 'accepted') {
    card.innerHTML = `
      <div style="font-size:2.5rem;margin-bottom:16px">✅</div>
      <h3>Already Joined!</h3>
      <p style="margin:12px 0">This invitation has already been accepted.</p>
      <a href="dashboard.html" class="btn btn-primary btn-full mt-3">Go to Dashboard</a>`;
    return;
  }

  const group = await DB.groups.findById(groupId);
  if (!group) {
    card.innerHTML = `
      <div style="font-size:2.5rem;margin-bottom:16px">💔</div>
      <h3>Group Not Found</h3>
      <p style="margin:12px 0">This group may have been deleted.</p>
      <a href="index.html" class="btn btn-primary btn-full mt-3">Go Home</a>`;
    return;
  }

  const catIcons  = { trip:'✈️', home:'🏠', friends:'👫', couple:'💑', work:'💼', other:'📦' };
  const catColors = { trip:'rgba(108,99,255,0.2)', home:'rgba(34,197,94,0.2)', friends:'rgba(249,115,22,0.2)', couple:'rgba(236,72,153,0.2)', work:'rgba(59,130,246,0.2)', other:'rgba(168,85,247,0.2)' };
  const members   = group.members || [];
  const user      = Auth.currentUser();

  if (user) {
    if (members.includes(user.id) || members.includes(user.email)) {
      card.innerHTML = `
        <div style="font-size:2.5rem;margin-bottom:16px">🎉</div>
        <h3>You're already in this group!</h3>
        <p style="margin:12px 0">${group.name}</p>
        <a href="group.html?id=${group.id}" class="btn btn-primary btn-full mt-3">Open Group →</a>`;
      return;
    }

    card.innerHTML = `
      <div class="invite-icon" style="background:${catColors[group.category]||catColors.other}">${catIcons[group.category]||'📦'}</div>
      <h2>${inviterName || 'Someone'} invited you to join</h2>
      <div class="group-preview">
        <div style="font-family:var(--font-display);font-weight:800;font-size:1.1rem;margin-bottom:4px">${group.name}</div>
        ${group.description ? `<div style="font-size:0.82rem;color:var(--text3);margin-bottom:10px">${group.description}</div>` : ''}
        <div style="font-size:0.75rem;color:var(--text3)">${members.length} member${members.length!==1?'s':''}</div>
      </div>
      <div class="alert alert-info" style="text-align:left;margin:12px 0">
        You're signed in as <strong>${user.name}</strong> (${user.email}).
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="joinGroup()">🎉 Join ${group.name}</button>
      <button class="btn btn-ghost btn-full mt-2" onclick="Auth.logout()">Sign in as someone else</button>`;
  } else {
    card.innerHTML = `
      <div class="invite-icon" style="background:${catColors[group.category]||catColors.other}">${catIcons[group.category]||'📦'}</div>
      <h2 style="margin-bottom:4px">${inviterName || 'Someone'} invited you to join</h2>
      <p style="margin-bottom:0">Sign in or create an account to join the group</p>
      <div class="group-preview">
        <div style="font-family:var(--font-display);font-weight:800;font-size:1.1rem;margin-bottom:4px">${group.name}</div>
        ${group.description ? `<div style="font-size:0.82rem;color:var(--text3);margin-bottom:10px">${group.description}</div>` : ''}
      </div>
      <div id="auth-alert"></div>
      <div id="auth-section">
        <button class="btn btn-secondary btn-full" style="margin-bottom:12px;background:white;color:#333;font-weight:600" onclick="googleJoin()">
          <svg width="18" viewBox="0 0 24 24" style="margin-right:4px"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <div style="text-align:center;font-size:0.8rem;color:var(--text3);margin:12px 0">— or —</div>
        <div class="tabs" style="margin-bottom:16px">
          <button class="tab-btn active" onclick="showAuthTab('login',this)">Sign In</button>
          <button class="tab-btn" onclick="showAuthTab('register',this)">Register</button>
        </div>
        <div id="login-section">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="auth-email" class="form-input" placeholder="you@example.com" value="${invitedEmail||''}">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="auth-password" class="form-input" placeholder="Your password">
          </div>
          <button class="btn btn-primary btn-full" onclick="loginAndJoin()">Sign In & Join Group →</button>
        </div>
        <div id="register-section" style="display:none">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="reg-name" class="form-input" placeholder="Your full name">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" value="${invitedEmail||''}">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="reg-password" class="form-input" placeholder="Min 6 characters">
          </div>
          <button class="btn btn-primary btn-full" onclick="registerAndJoin()">Create Account & Join →</button>
        </div>
      </div>`;
  }
}

function showAuthTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('login-section').style.display  = tab === 'login'    ? 'block' : 'none';
  document.getElementById('register-section').style.display = tab === 'register' ? 'block' : 'none';
}

function setAlert(msg, type = 'error') {
  const el = document.getElementById('auth-alert');
  if (el) el.innerHTML = `<div class="alert alert-${type === 'ok' ? 'success' : 'error'}" style="text-align:left">${msg}</div>`;
}

async function joinGroup() {
  const user    = Auth.currentUser();
  const payload = await _jwtVerify(rawToken);
  if (!user || !payload) return;
  await _fs().collection('groups').doc(payload.groupId).update({
    members: firebase.firestore.FieldValue.arrayUnion(user.id || user.email)
  });
  await _fs().collection('invitations').doc(rawToken.slice(-20)).update({ status: 'accepted', acceptedAt: Date.now() });
  showSuccess(payload.groupId);
}

function loginAndJoin() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const r = Auth.login(email, password);
  if (!r.success) { setAlert(r.error); return; }
  acceptInvite();
}

function registerAndJoin() {
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const r = Auth.register(email, name, password);
  if (!r.success) { setAlert(r.error); return; }
  acceptInvite();
}

function googleJoin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(async (result) => {
      const fu = result.user;
      let u = await DB.users.findByEmail(fu.email);
      if (!u) u = await DB.users.create(fu.email, fu.displayName || fu.email, '__google__');
      Auth.setSession(u);
      acceptInvite();
    })
    .catch(err => setAlert('Google sign-in failed: ' + err.message));
}

async function acceptInvite() {
  const user    = Auth.currentUser();
  const payload = await _jwtVerify(rawToken);
  if (!user || !payload) return;
  await _fs().collection('groups').doc(payload.groupId).update({
    members: firebase.firestore.FieldValue.arrayUnion(user.id || user.email)
  });
  await _fs().collection('invitations').doc(rawToken.slice(-20)).update({ status: 'accepted', acceptedAt: Date.now() });
  showSuccess(payload.groupId);
}

async function showSuccess(groupId) {
  const group = await DB.groups.findById(groupId);
  document.getElementById('invite-card').innerHTML = `
    <div style="font-size:3rem;margin-bottom:16px">🎉</div>
    <h2>You're in!</h2>
    <p style="margin:12px 0">You've successfully joined <strong>${group?.name || 'the group'}</strong>.</p>
    <a href="group.html?id=${groupId}" class="btn btn-primary btn-full btn-lg mt-3">Open Group →</a>
    <a href="dashboard.html" class="btn btn-ghost btn-full mt-2">Go to Dashboard</a>`;
}

render();
</script>
</body>
