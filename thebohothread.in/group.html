<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Groups – SplitEase</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/landing.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey:            "AIzaSyCLz4cXKGxILS5Use2KPe4XaUnLRhcrIyg",
        authDomain:        "thebohothread-96e2c.firebaseapp.com",
        projectId:         "thebohothread-96e2c",
        storageBucket:     "thebohothread-96e2c.firebasestorage.app",
        messagingSenderId: "100688387088",
        appId:             "1:100688387088:web:f8a6af7565d3c25952fe95"
      });
    }
  </script>

  <style>
    .cat-option { display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s;font-size:0.8rem;gap:6px; }
    .cat-option:hover { border-color:var(--accent); }
    .cat-option.selected { border-color:var(--accent);background:var(--accent-glow);color:var(--accent-bright); }
    .cat-options { display:grid;grid-template-columns:repeat(3,1fr);gap:10px; }

    .groups-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px; }
    .group-card {
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);
      padding:20px;cursor:pointer;transition:all 0.2s;position:relative;
    }
    .group-card:hover { border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,106,247,0.12); }
    .group-card-top { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px; }
    .group-card-icon { font-size:2rem;line-height:1; }
    .group-card-members { font-size:0.75rem;color:var(--text-muted);background:var(--bg3);padding:3px 8px;border-radius:99px; }
    .group-card-name { font-family:var(--font-display);font-weight:800;font-size:1.05rem;margin-bottom:3px; }
    .group-card-desc { font-size:0.8rem;color:var(--text-muted);margin-bottom:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .group-card-stats { display:flex;gap:12px;justify-content:space-between;align-items:center; }
    .group-card-amount { font-family:var(--font-display);font-weight:700;font-size:1.1rem; }
    .group-card-expenses { font-size:0.78rem;color:var(--text-dim); }
    .group-card-bal { font-size:0.8rem;font-weight:600; }

    /* 3-dot menu */
    .three-dot-btn {
      position:absolute;top:12px;right:12px;
      background:transparent;border:none;color:var(--text-muted);
      font-size:1.2rem;cursor:pointer;border-radius:6px;
      width:28px;height:28px;display:flex;align-items:center;justify-content:center;
      transition:all 0.15s;line-height:1;z-index:2;
    }
    .three-dot-btn:hover { background:var(--bg3);color:var(--text); }
    .dropdown-menu {
      position:absolute;top:38px;right:10px;
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);
      box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:100;min-width:160px;
      overflow:hidden;display:none;
    }
    .dropdown-menu.open { display:block; }
    .dropdown-item {
      padding:10px 16px;font-size:0.85rem;cursor:pointer;
      transition:background 0.1s;display:flex;align-items:center;gap:8px;color:var(--text);
    }
    .dropdown-item:hover { background:var(--bg3); }
    .dropdown-item.danger { color:var(--red); }
    .dropdown-item.danger:hover { background:rgba(239,68,68,0.08); }
  </style>
</head>
<body class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px">
      <div class="page-header" style="margin-bottom:0">
        <h1 class="page-title">My Groups</h1>
        <p class="page-subtitle">Manage your shared expense groups</p>
      </div>
      <button class="btn-primary" onclick="openCreateGroup()">+ New Group</button>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      <input type="text" class="form-input" id="search-input" placeholder="Search groups..." style="max-width:260px" oninput="renderGroups()" />
    </div>

    <div id="groups-list" class="groups-grid">
      <div style="color:var(--text-muted);padding:40px;text-align:center;grid-column:1/-1">Loading groups…</div>
    </div>
  </main>

  <!-- Create Group Modal -->
  <div class="modal-overlay" id="create-group-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Create New Group</h2>
        <button class="modal-close" onclick="UI.closeModal('create-group-modal')">&times;</button>
      </div>
      <div class="form-group">
        <label class="form-label">Group Name *</label>
        <input type="text" class="form-input" id="g-name" placeholder="e.g. Goa Trip 2025" maxlength="60" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" class="form-input" id="g-desc" placeholder="Optional description" />
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="cat-options" id="cat-options">
          <div class="cat-option selected" data-cat="trip" onclick="selectCat('trip')">✈️<span>Trip</span></div>
          <div class="cat-option" data-cat="home" onclick="selectCat('home')">🏠<span>Home</span></div>
          <div class="cat-option" data-cat="friends" onclick="selectCat('friends')">👫<span>Friends</span></div>
          <div class="cat-option" data-cat="couple" onclick="selectCat('couple')">❤️<span>Couple</span></div>
          <div class="cat-option" data-cat="work" onclick="selectCat('work')">💼<span>Work</span></div>
          <div class="cat-option" data-cat="other" onclick="selectCat('other')">📦<span>Other</span></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Currency</label>
        <select class="form-input" id="g-currency">
          <option value="INR">₹ Indian Rupee (INR)</option>
          <option value="USD">$ US Dollar (USD)</option>
          <option value="EUR">€ Euro (EUR)</option>
          <option value="GBP">£ British Pound (GBP)</option>
          <option value="AUD">A$ Australian Dollar (AUD)</option>
          <option value="JPY">¥ Japanese Yen (JPY)</option>
        </select>
      </div>
      <button class="btn-primary w-full" style="width:100%;margin-top:8px" onclick="createGroup()">Create Group</button>
    </div>
  </div>

  <!-- Edit Group Modal -->
  <div class="modal-overlay" id="edit-group-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Edit Group</h2>
        <button class="modal-close" onclick="UI.closeModal('edit-group-modal')">&times;</button>
      </div>
      <div class="form-group">
        <label class="form-label">Group Name *</label>
        <input type="text" class="form-input" id="eg-name" placeholder="Group name" maxlength="60" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" class="form-input" id="eg-desc" placeholder="Optional description" />
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="cat-options" id="edit-cat-options">
          <div class="cat-option" data-cat="trip" onclick="selectEditCat('trip')">✈️<span>Trip</span></div>
          <div class="cat-option" data-cat="home" onclick="selectEditCat('home')">🏠<span>Home</span></div>
          <div class="cat-option" data-cat="friends" onclick="selectEditCat('friends')">👫<span>Friends</span></div>
          <div class="cat-option" data-cat="couple" onclick="selectEditCat('couple')">❤️<span>Couple</span></div>
          <div class="cat-option" data-cat="work" onclick="selectEditCat('work')">💼<span>Work</span></div>
          <div class="cat-option" data-cat="other" onclick="selectEditCat('other')">📦<span>Other</span></div>
        </div>
      </div>
      <button class="btn-primary w-full" style="width:100%;margin-top:8px" onclick="saveEditGroup()">Save Changes</button>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    const fs = () => firebase.firestore();
    function _rid() { return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }

    const CAT_ICONS = {trip:'✈️',home:'🏠',friends:'👫',event:'🎉',couple:'❤️',work:'💼',other:'📦'};

    let currentUser, allGroups=[], selectedCat='trip', editingGroupId=null, editingCat='trip';

    document.addEventListener('DOMContentLoaded', async () => {
      // If an ?id= param was passed, redirect to the proper group detail page
      const gid = new URLSearchParams(location.search).get('id');
      if (gid) { window.location.replace('pages/group-detail.html?id=' + gid); return; }

      currentUser = Auth.requireAuth('index.html');
      if (!currentUser) return;
      Sidebar.init('groups');
      await loadGroups();
      if (new URLSearchParams(location.search).get('new') === '1') openCreateGroup();
    });

    // Close any open dropdown on outside click
    document.addEventListener('click', e => {
      if (!e.target.closest('.three-dot-btn') && !e.target.closest('.dropdown-menu')) {
        document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
      }
    });

    async function loadGroups() {
      const myKey = currentUser.id || currentUser.email;
      try {
        const snap = await fs().collection('groups').where('members','array-contains',myKey).get();
        allGroups = snap.docs.map(d => d.data()).sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
        renderGroups();
      } catch(err) {
        document.getElementById('groups-list').innerHTML =
          `<div style="color:var(--red);padding:20px;grid-column:1/-1">Failed to load groups: ${err.message}</div>`;
      }
    }

    function renderGroups() {
      const query = (document.getElementById('search-input')?.value||'').toLowerCase();
      const filtered = allGroups.filter(g =>
        !query || g.name.toLowerCase().includes(query) || (g.description||'').toLowerCase().includes(query)
      );

      const list = document.getElementById('groups-list');
      if (!filtered.length) {
        list.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">👥</div>
          <h3>${query?'No groups match your search':'No groups yet'}</h3>
          <p>${query?'Try a different search term':'Create your first group to start tracking shared expenses'}</p>
          ${!query?'<button class="btn-primary" onclick="openCreateGroup()">+ Create Group</button>':''}
        </div>`;
        return;
      }

      list.innerHTML = filtered.map(g => {
        const myKey = currentUser.id||currentUser.email;
        const isAdmin = g.createdBy === myKey;
        const balText = '✓ Settled up'; // balances computed client-side after expenses load

        return `
          <div class="group-card" onclick="goToGroup(event,'${g.id}')">
            <!-- 3-dot menu button -->
            <button class="three-dot-btn" onclick="toggleMenu(event,'menu-${g.id}')" title="Options">⋮</button>
            <div class="dropdown-menu" id="menu-${g.id}">
              <div class="dropdown-item" onclick="openEditGroup(event,'${g.id}')">✏️ Edit Group</div>
              ${isAdmin ? `<div class="dropdown-item danger" onclick="confirmDelete(event,'${g.id}','${g.name.replace(/'/g,"\\'")}')">🗑️ Delete Group</div>` : ''}
            </div>

            <div class="group-card-top">
              <div class="group-card-icon">${CAT_ICONS[g.category]||'📦'}</div>
              <div class="group-card-members">${g.members.length} member${g.members.length!==1?'s':''}</div>
            </div>
            <div class="group-card-name">${g.name}</div>
            <div class="group-card-desc">${g.description||'No description'}</div>
            <div class="group-card-stats">
              <div>
                <div class="group-card-amount">₹0.00</div>
                <div class="group-card-expenses">Total spent</div>
              </div>
              <div style="text-align:center">
                <div style="font-weight:700">0</div>
                <div class="group-card-expenses">Expenses</div>
              </div>
              <div class="group-card-bal text-muted">Settled up ✓</div>
            </div>
          </div>`;
      }).join('');
    }

    function goToGroup(e, id) {
      // Don't navigate if clicking the 3-dot btn or its dropdown
      if (e.target.closest('.three-dot-btn') || e.target.closest('.dropdown-menu')) return;
      window.location.href = 'group-detail.html?id=' + id;
    }

    function toggleMenu(e, menuId) {
      e.stopPropagation();
      const menu = document.getElementById(menuId);
      const wasOpen = menu.classList.contains('open');
      // Close all first
      document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
      if (!wasOpen) menu.classList.add('open');
    }

    // ── Create Group ──────────────────────────────────────────────────────────
    function selectCat(cat) {
      selectedCat = cat;
      document.querySelectorAll('#cat-options .cat-option').forEach(el => el.classList.toggle('selected', el.dataset.cat===cat));
    }

    function openCreateGroup() {
      selectedCat = 'trip';
      document.querySelectorAll('#cat-options .cat-option').forEach(el => el.classList.toggle('selected', el.dataset.cat==='trip'));
      ['g-name','g-desc'].forEach(id => document.getElementById(id).value='');
      UI.openModal('create-group-modal');
      document.getElementById('g-name').focus();
    }

    async function createGroup() {
      const name = document.getElementById('g-name').value.trim();
      const desc = document.getElementById('g-desc').value.trim();
      const currency = document.getElementById('g-currency').value;
      if (!name) return UI.toast('Group name is required.','error');

      const myKey = currentUser.id || currentUser.email;
      const id = _rid();
      const group = {
        id, name, description: desc, category: selectedCat,
        currency: currency==='INR'?'₹':currency==='USD'?'$':currency==='EUR'?'€':currency==='GBP'?'£':currency,
        createdBy: myKey, members: [myKey],
        createdAt: Date.now(), isActive: true
      };
      try {
        await fs().collection('groups').doc(id).set(group);
        // Also add groupId to user's groups array
        await fs().collection('users').doc(myKey).set({ groups: firebase.firestore.FieldValue.arrayUnion(id) }, {merge:true});
        UI.closeModal('create-group-modal');
        UI.toast(`"${name}" created! 🎉`,'success');
        allGroups.unshift(group);
        renderGroups();
      } catch(err) {
        UI.toast('Failed to create group: '+err.message,'error');
      }
    }

    // ── Edit Group ────────────────────────────────────────────────────────────
    function selectEditCat(cat) {
      editingCat = cat;
      document.querySelectorAll('#edit-cat-options .cat-option').forEach(el => el.classList.toggle('selected', el.dataset.cat===cat));
    }

    function openEditGroup(e, groupId) {
      e.stopPropagation();
      document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));

      const g = allGroups.find(x => x.id===groupId);
      if (!g) return;
      editingGroupId = groupId;
      editingCat = g.category || 'trip';

      document.getElementById('eg-name').value = g.name;
      document.getElementById('eg-desc').value = g.description || '';
      document.querySelectorAll('#edit-cat-options .cat-option').forEach(el => el.classList.toggle('selected', el.dataset.cat===editingCat));

      UI.openModal('edit-group-modal');
      document.getElementById('eg-name').focus();
    }

    async function saveEditGroup() {
      const name = document.getElementById('eg-name').value.trim();
      const desc = document.getElementById('eg-desc').value.trim();
      if (!name) return UI.toast('Group name is required.','error');
      if (!editingGroupId) return;

      try {
        await fs().collection('groups').doc(editingGroupId).update({
          name, description: desc, category: editingCat, updatedAt: Date.now()
        });
        // Update local cache
        const idx = allGroups.findIndex(g => g.id===editingGroupId);
        if (idx > -1) { allGroups[idx] = {...allGroups[idx], name, description:desc, category:editingCat}; }
        UI.closeModal('edit-group-modal');
        UI.toast('Group updated! ✓','success');
        renderGroups();
      } catch(err) {
        UI.toast('Failed to update: '+err.message,'error');
      }
    }

    // ── Delete Group ──────────────────────────────────────────────────────────
    function confirmDelete(e, groupId, groupName) {
      e.stopPropagation();
      document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
      UI.confirm(`Delete "${groupName}"? This will remove all expenses permanently.`, async () => {
        try {
          const expSnap = await fs().collection('expenses').where('groupId','==',groupId).get();
          const batch = fs().batch();
          expSnap.docs.forEach(d => batch.delete(d.ref));
          batch.delete(fs().collection('groups').doc(groupId));
          await batch.commit();
          allGroups = allGroups.filter(g => g.id!==groupId);
          UI.toast('Group deleted.','info');
          renderGroups();
        } catch(err) {
          UI.toast('Failed to delete: '+err.message,'error');
        }
      });
    }
  </script>
</body>
</html>
