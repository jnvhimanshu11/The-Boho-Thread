<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Expense — SplitMate</title>
<link rel="stylesheet" href="style.css">
<style>
.expense-form-wrap { max-width: 680px; }
.split-section { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.split-method-tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 8px; margin-bottom: 16px; }
.split-method-btn { flex: 1; padding: 7px; border: none; background: none; color: var(--text3); font-size: 0.8rem; font-weight: 600; cursor: pointer; border-radius: 6px; transition: all var(--transition); }
.split-method-btn.active { background: var(--surface); color: var(--text); }
.amount-display { font-family: var(--font-display); font-size: 3rem; font-weight: 800; text-align: center; background: none; border: none; color: var(--text); width: 100%; outline: none; margin: 20px 0 4px; letter-spacing: -1px; }
.amount-display::placeholder { color: var(--text3); }
.currency-label { text-align: center; color: var(--text3); font-size: 0.85rem; margin-bottom: 24px; }
.payer-select-row { display: flex; align-items: center; gap: 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; cursor: pointer; margin-bottom: 16px; }
.split-total-row { display: flex; justify-content: space-between; padding: 10px 0; font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 8px; }
.split-remaining { color: var(--orange); font-weight: 700; }
.split-remaining.ok { color: var(--green); }
.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.cat-option { padding: 10px 6px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg3); cursor: pointer; text-align: center; font-size: 0.78rem; transition: all var(--transition); }
.cat-option:hover { border-color: var(--border2); }
.cat-option.selected { border-color: var(--accent); background: rgba(108,99,255,0.12); color: var(--accent2); }
.cat-option .icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }
</style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="page-wrap">
  <div class="main-content">
    <div class="expense-form-wrap">
      <div class="breadcrumb mb-3">
        <a href="dashboard.html">Dashboard</a>
        <span class="sep">›</span>
        <a href="#" id="bc-group">Group</a>
        <span class="sep">›</span>
        <span id="bc-action">Add Expense</span>
      </div>

      <div class="page-header">
        <h2 id="form-title">Add Expense</h2>
        <p>Track what you spent and who owes what</p>
      </div>

      <!-- AMOUNT -->
      <div class="card mb-4" style="text-align:center;padding:28px">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Amount</label>
          <input type="number" id="exp-amount" class="amount-display" placeholder="0.00" min="0" step="0.01" oninput="onAmountChange()">
          <div class="currency-label">Indian Rupees (₹)</div>
        </div>
      </div>

      <!-- DESCRIPTION & CATEGORY -->
      <div class="card mb-4">
        <div class="form-group">
          <label class="form-label">Description *</label>
          <input type="text" id="exp-desc" class="form-input" placeholder="What was this expense for?">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Category</label>
          <div class="cat-grid" id="cat-grid"></div>
        </div>
      </div>

      <!-- GROUP & PAYER -->
      <div class="card mb-4">
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Group</label>
            <select id="exp-group" class="form-select" onchange="onGroupChange()"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" id="exp-date" class="form-input">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Paid by</label>
          <select id="exp-payer" class="form-select"></select>
        </div>
      </div>

      <!-- SPLIT -->
      <div class="card mb-4">
        <div class="flex-between mb-3">
          <h3>Split</h3>
          <div class="split-method-tabs">
            <button class="split-method-btn active" onclick="setSplitMethod('equal')">= Equal</button>
            <button class="split-method-btn" onclick="setSplitMethod('exact')">₹ Exact</button>
            <button class="split-method-btn" onclick="setSplitMethod('percent')">% Percent</button>
          </div>
        </div>
        <div class="split-section">
          <div id="split-rows"></div>
          <div class="split-total-row">
            <span>Total: <strong id="split-total">₹0.00</strong></span>
            <span>Remaining: <strong class="split-remaining" id="split-remaining">₹0.00</strong></span>
          </div>
        </div>
      </div>

      <!-- NOTES -->
      <div class="card mb-4">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Notes (optional)</label>
          <textarea id="exp-notes" class="form-textarea" placeholder="Any additional notes..."></textarea>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="flex gap-3">
        <button class="btn btn-secondary" onclick="goBack()">Cancel</button>
        <button class="btn btn-primary flex-1 btn-lg" onclick="saveExpense()">Save Expense →</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="url-mask.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyCLz4cXKGxILS5Use2KPe4XaUnLRhcrIyg",
    authDomain:        "thebohothread-96e2c.firebaseapp.com",
    projectId:         "thebohothread-96e2c",
    storageBucket:     "thebohothread-96e2c.firebasestorage.app",
    messagingSenderId: "100688387088",
    appId:             "1:100688387088:web:f8a6af7565d3c25952fe95",
    measurementId:     "G-5VTK93354M"
  };
  firebase.initializeApp(firebaseConfig);
</script>
<script src="db.firestore.js"></script>
<script src="auth.js"></script>
<script>
const user = Auth.requireAuth();
const params = window.__urlParams || new URLSearchParams(location.search);
const preGroupId = params.get('group');
const editId = params.get('edit');
let splitMethod = 'equal';
let selectedCategory = 'general';
let currentMembers = [];
let editExpense = null;

if (user) init();

function init() {
  document.getElementById('sidebar-mount').innerHTML = renderSidebar('expenses');
  initSidebar();
  // Set today's date
  document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];
  populateGroupSelect();
  renderCategories();
  if (editId) loadEdit();
}

function populateGroupSelect() {
  const groups = DB.groups.forUser(user.id);
  const sel = document.getElementById('exp-group');
  sel.innerHTML = groups.map(g => `<option value="${g.id}"${g.id===preGroupId?' selected':''}>${g.name}</option>`).join('');
  onGroupChange();
}

async function onGroupChange() {
  const groupId = document.getElementById('exp-group').value;
  const group = DB.groups.findById(groupId);
  if (!group) return;
  document.getElementById('bc-group').textContent = group.name;
  document.getElementById('bc-group').href = `group.html?id=${groupId}`;

  // Accepted members (have real user records)
  const acceptedMembers = group.members.map(uid => DB.users.findById(uid)).filter(Boolean);

  // Pending / rejected invites — show as email-only virtual members
  let pendingInvites = [];
  try {
    pendingInvites = await DB.invitations.getPendingForGroup(groupId);
  } catch(e) {
    // fallback: sync version
    try { pendingInvites = DB.invitations.getPendingForGroup(groupId); } catch(_) {}
  }

  // Build a unified member list:
  // Real members get their user object; only truly pending invites shown (not declined)
  const inviteVirtuals = pendingInvites
    .filter(inv => inv.status === 'pending')
    .map(inv => ({
    id: inv.token,           // use token as a unique key
    name: inv.email,         // show email as name until accepted
    email: inv.email,
    avatarColor: '#888',
    isInvitePending: inv.status === 'pending',
    isInviteRejected: inv.status === 'rejected',
    inviteToken: inv.token
  }));

  currentMembers = [...acceptedMembers, ...inviteVirtuals];
  populatePayerSelect();
  renderSplitRows();
}

function populatePayerSelect() {
  const sel = document.getElementById('exp-payer');
  sel.innerHTML = currentMembers.map(m => {
    let label;
    if (m.isInvitePending) {
      label = `${m.email} (invited)`;
    } else {
      label = m.id === user.id ? 'You' : m.name;
    }
    return `<option value="${m.id}"${m.id===user.id?' selected':''}>${label}</option>`;
  }).join('');
}

function renderCategories() {
  document.getElementById('cat-grid').innerHTML = Object.entries(CATEGORIES).map(([key, cat]) =>
    `<div class="cat-option${key===selectedCategory?' selected':''}" onclick="selectCat('${key}')">
      <span class="icon">${cat.icon}</span>${cat.label}
    </div>`
  ).join('');
}

function selectCat(key) {
  selectedCategory = key;
  renderCategories();
}

function setSplitMethod(method) {
  splitMethod = method;
  document.querySelectorAll('.split-method-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['equal','exact','percent'][i] === method);
  });
  renderSplitRows();
}

function renderSplitRows() {
  const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
  const el = document.getElementById('split-rows');

  if (!currentMembers.length) { el.innerHTML = '<p class="text-muted text-sm">No members in this group</p>'; return; }

  // Helper: display label for a member
  function memberLabel(m) {
    if (m.isInvitePending) return `<span style="color:var(--text2)">${m.email}</span> <span style="font-size:0.72rem;background:rgba(255,165,0,0.18);color:#e6a817;border-radius:4px;padding:1px 6px;font-weight:700">Invited</span>`;
    if (m.isInviteRejected) return `<span style="color:var(--text3)">${m.email}</span> <span style="font-size:0.72rem;background:rgba(255,80,80,0.15);color:#e05252;border-radius:4px;padding:1px 6px;font-weight:700">Declined</span>`;
    return m.id === user.id ? 'You' : m.name;
  }

  // Helper: avatar initials — use @ for email-only members
  function memberAvatar(m) {
    if (m.isInvitePending || m.isInviteRejected) {
      const color = m.isInviteRejected ? '#888' : '#e6a817';
      return `<div class="avatar" style="background:${color};width:28px;height:28px;font-size:0.7rem;flex-shrink:0;opacity:${m.isInviteRejected?'0.5':'1'}">@</div>`;
    }
    return `<div class="avatar" style="background:${m.avatarColor||'#6c63ff'};width:28px;height:28px;font-size:0.7rem;flex-shrink:0">${initials(m.name)}</div>`;
  }

  if (splitMethod === 'equal') {
    const share = currentMembers.length ? Math.round((amount / currentMembers.length) * 100) / 100 : 0;
    el.innerHTML = currentMembers.map(m => `
      <div class="split-row">
        <button class="split-toggle active" id="toggle-${m.id}" onclick="toggleMember('${m.id}')">✓</button>
        ${memberAvatar(m)}
        <div style="flex:1;font-size:0.88rem;font-weight:500">${memberLabel(m)}</div>
        <div style="font-family:var(--font-display);font-weight:700;font-size:0.9rem" id="share-${m.id}">${formatCurrency(share)}</div>
      </div>`).join('');
    updateSplitTotals();
  } else if (splitMethod === 'exact') {
    const share = currentMembers.length ? Math.round((amount / currentMembers.length) * 100) / 100 : 0;
    el.innerHTML = currentMembers.map(m => `
      <div class="split-row">
        ${memberAvatar(m)}
        <div style="flex:1;font-size:0.88rem;font-weight:500">${memberLabel(m)}</div>
        <input type="number" class="split-amount-input" id="exact-${m.id}" value="${share}" min="0" step="0.01" oninput="updateSplitTotals()">
      </div>`).join('');
    updateSplitTotals();
  } else {
    const pct = currentMembers.length ? Math.round(100 / currentMembers.length) : 0;
    el.innerHTML = currentMembers.map((m, i) => `
      <div class="split-row">
        ${memberAvatar(m)}
        <div style="flex:1;font-size:0.88rem;font-weight:500">${memberLabel(m)}</div>
        <input type="number" class="split-amount-input" id="pct-${m.id}" value="${i===currentMembers.length-1?100-(pct*(currentMembers.length-1)):pct}" min="0" max="100" step="1" oninput="updateSplitTotals()">
        <span style="color:var(--text3);font-size:0.85rem">%</span>
      </div>`).join('');
    updateSplitTotals();
  }
}

function toggleMember(uid) {
  const btn = document.getElementById(`toggle-${uid}`);
  const isActive = btn.classList.toggle('active');
  // Recalculate equal splits
  onAmountChange();
}

function onAmountChange() {
  renderSplitRows();
  updateSplitTotals();
}

function updateSplitTotals() {
  const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
  let splitTotal = 0;

  if (splitMethod === 'equal') {
    const active = currentMembers.filter(m => document.getElementById(`toggle-${m.id}`)?.classList.contains('active'));
    const share = active.length ? Math.round((amount / active.length) * 100) / 100 : 0;
    currentMembers.forEach((m, i) => {
      const isActive = document.getElementById(`toggle-${m.id}`)?.classList.contains('active');
      const myShare = isActive ? (i === active.length - 1 ? amount - (share * (active.length - 1)) : share) : 0;
      const el = document.getElementById(`share-${m.id}`);
      if (el) el.textContent = formatCurrency(myShare);
      if (isActive) splitTotal += myShare;
    });
  } else if (splitMethod === 'exact') {
    currentMembers.forEach(m => {
      const val = parseFloat(document.getElementById(`exact-${m.id}`)?.value) || 0;
      splitTotal += val;
    });
  } else {
    let totalPct = 0;
    currentMembers.forEach(m => { totalPct += parseFloat(document.getElementById(`pct-${m.id}`)?.value) || 0; });
    splitTotal = Math.round(amount * (totalPct / 100) * 100) / 100;
  }

  const remaining = Math.round((amount - splitTotal) * 100) / 100;
  document.getElementById('split-total').textContent = formatCurrency(splitTotal);
  const remEl = document.getElementById('split-remaining');
  remEl.textContent = formatCurrency(remaining);
  remEl.className = `split-remaining${Math.abs(remaining) < 0.01 ? ' ok' : ''}`;
}

function getSplits() {
  const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
  if (splitMethod === 'equal') {
    const active = currentMembers.filter(m => document.getElementById(`toggle-${m.id}`)?.classList.contains('active'));
    return DB.calc.splitEvenly(amount, active.map(m => m.id));
  } else if (splitMethod === 'exact') {
    return currentMembers.map(m => ({
      userId: m.id,
      amount: parseFloat(document.getElementById(`exact-${m.id}`)?.value) || 0
    })).filter(s => s.amount > 0);
  } else {
    return currentMembers.map(m => {
      const pct = parseFloat(document.getElementById(`pct-${m.id}`)?.value) || 0;
      return { userId: m.id, amount: Math.round(amount * (pct / 100) * 100) / 100 };
    }).filter(s => s.amount > 0);
  }
}

function saveExpense() {
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const desc = document.getElementById('exp-desc').value.trim();
  const groupId = document.getElementById('exp-group').value;
  const paidBy = document.getElementById('exp-payer').value;
  const dateStr = document.getElementById('exp-date').value;
  const notes = document.getElementById('exp-notes').value.trim();

  if (!amount || amount <= 0) { showToast('Enter a valid amount', 'error'); return; }
  if (!desc) { showToast('Description is required', 'error'); return; }
  if (!groupId) { showToast('Select a group', 'error'); return; }

  const splits = getSplits();
  if (!splits.length) { showToast('At least one person must be included in the split', 'error'); return; }

  const remaining = Math.abs(amount - splits.reduce((s, x) => s + x.amount, 0));
  if (remaining > 0.02) { showToast(`Split amounts don't add up. Remaining: ${formatCurrency(remaining)}`, 'error'); return; }

  const date = dateStr ? new Date(dateStr).getTime() : Date.now();

  if (editId) {
    DB.expenses.update(editId, { description: desc, amount, category: selectedCategory, paidBy, splits, date, notes });
    showToast('Expense updated!', 'success');
  } else {
    DB.expenses.create({ groupId, description: desc, amount, category: selectedCategory, paidBy, splits, date, notes });
    showToast('Expense added!', 'success');
  }

  location.href = `group.html?id=${groupId}`;
}

function loadEdit() {
  editExpense = DB.expenses.findById(editId);
  if (!editExpense) { location.href = 'dashboard.html'; return; }
  document.getElementById('form-title').textContent = 'Edit Expense';
  document.getElementById('bc-action').textContent = 'Edit Expense';
  document.getElementById('exp-amount').value = editExpense.amount;
  document.getElementById('exp-desc').value = editExpense.description;
  document.getElementById('exp-notes').value = editExpense.notes || '';
  selectedCategory = editExpense.category || 'general';
  document.getElementById('exp-date').value = new Date(editExpense.date).toISOString().split('T')[0];
  renderCategories();
  onAmountChange();
}

function goBack() {
  const groupId = document.getElementById('exp-group')?.value;
  location.href = groupId ? `group.html?id=${groupId}` : 'dashboard.html';
}
</script>
</body>
</html>
