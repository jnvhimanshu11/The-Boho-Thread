<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Expenses — SplitMate</title>
<link rel="stylesheet" href="style.css">
<style>
.expense-full-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: var(--radius-sm); transition: background var(--transition); cursor: default; }
.expense-full-row:hover { background: var(--surface2); }
.exp-group-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; font-size: 0.72rem; color: var(--text3); }
.month-header { font-family: var(--font-display); font-weight: 700; font-size: 0.8rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 16px 16px 6px; }
.chart-bar-wrap { display: flex; align-items: flex-end; gap: 4px; height: 80px; }
.chart-bar { flex: 1; border-radius: 4px 4px 0 0; min-width: 20px; transition: opacity var(--transition); cursor: pointer; }
.chart-bar:hover { opacity: 0.8; }
.pie-wrap { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.pie-legend { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.pie-legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
.pie-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text-muted); }
.loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="page-wrap">
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-row">
        <div>
          <div class="page-title">All Expenses</div>
          <div class="page-subtitle">Your complete expense history</div>
        </div>
        <a href="add-expense.html" class="btn btn-primary">+ Add Expense</a>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Group Spend</div><div class="stat-value stat-purple">—</div></div>
      <div class="stat-card"><div class="stat-label">Amount You Paid</div><div class="stat-value">—</div></div>
      <div class="stat-card"><div class="stat-label">Your Share</div><div class="stat-value">—</div></div>
      <div class="stat-card"><div class="stat-label">Net Balance</div><div class="stat-value">—</div></div>
    </div>

    <!-- CHARTS ROW -->
    <div class="grid-2 mb-4">
      <div class="card">
        <h3 style="margin-bottom:16px">Spending by Category</h3>
        <div id="cat-chart"><div class="loading-state"><div class="loading-spinner"></div></div></div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:16px">Monthly Overview</h3>
        <div id="monthly-chart"><div class="loading-state"><div class="loading-spinner"></div></div></div>
      </div>
    </div>

    <!-- FILTER ROW -->
    <div class="card mb-4" style="padding:16px">
      <div class="flex gap-3 flex-wrap" style="align-items:center">
        <div>
          <label class="form-label">Group</label>
          <select id="filter-group" class="form-select" onchange="applyFilters()" style="width:auto">
            <option value="all">All Groups</option>
          </select>
        </div>
        <div>
          <label class="form-label">Category</label>
          <select id="filter-cat" class="form-select" onchange="applyFilters()" style="width:auto">
            <option value="all">All Categories</option>
          </select>
        </div>
        <div>
          <label class="form-label">Month</label>
          <select id="filter-month" class="form-select" onchange="applyFilters()" style="width:auto">
            <option value="all">All Time</option>
          </select>
        </div>
        <div style="margin-top:18px">
          <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Clear</button>
        </div>
        <div style="margin-left:auto;margin-top:18px">
          <span id="result-count" class="text-sm text-muted"></span>
        </div>
      </div>
    </div>

    <!-- EXPENSE LIST -->
    <div class="card" style="padding:8px" id="expense-list">
      <div class="loading-state"><div class="loading-spinner"></div><span>Loading expenses…</span></div>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyCLz4cXKGxILS5Use2KPe4XaUnLRhcrIyg",
    authDomain:        "thebohothread-96e2c.firebaseapp.com",
    projectId:         "thebohothread-96e2c",
    storageBucket:     "thebohothread-96e2c.firebasestorage.app",
    messagingSenderId: "100688387088",
    appId:             "1:100688387088:web:f8a6af7565d3c25952fe95",
    measurementId:     "G-5VTK93354M"
  };
  firebase.initializeApp(firebaseConfig);
</script>
<script src="db.firestore.js"></script>
<script src="auth.js"></script>
<script>
// ── Constants ───────────────────────────────────────────────────────────────
const CAT_ICONS = {
  food:'🍽️', transport:'🚗', accommodation:'🏨', shopping:'🛍️',
  entertainment:'🎬', healthcare:'💊', utilities:'⚡',
  trip:'✈️', home:'🏠', friends:'👫', couple:'❤️', work:'💼', other:'📦'
};
const CAT_COLORS = {
  food:'#f59e0b', transport:'#3b82f6', accommodation:'#8b5cf6',
  shopping:'#ec4899', entertainment:'#06b6d4', healthcare:'#10b981',
  utilities:'#f97316', trip:'#6c63ff', home:'#22c55e',
  friends:'#a78bfa', couple:'#f43f5e', work:'#64748b', other:'#94a3b8'
};
const CAT_LABELS = {
  food:'Food', transport:'Transport', accommodation:'Accommodation',
  shopping:'Shopping', entertainment:'Entertainment', healthcare:'Healthcare',
  utilities:'Utilities', trip:'Trip', home:'Home', friends:'Friends',
  couple:'Couple', work:'Work', other:'Other'
};

function catIcon(c)  { return CAT_ICONS[c]  || '📦'; }
function catColor(c) { return CAT_COLORS[c] || '#94a3b8'; }
function catLabel(c) { return CAT_LABELS[c] || c; }
function fmt(n) { return '₹' + Math.abs(+n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

// ── State ────────────────────────────────────────────────────────────────────
let currentUser = null;
let allExpenses = [];   // { ...expense, groupName, groupId }
let allGroups   = [];   // group docs
let usersMap    = {};   // userId -> user doc
let filtered    = [];

// ── Boot ─────────────────────────────────────────────────────────────────────
firebase.auth().onAuthStateChanged(async fu => {
  if (!fu) { window.location.href = 'index.html'; return; }

  // Resolve current user from Firestore users collection
  try {
    const uSnap = await _fs().collection('users').where('email','==', fu.email).limit(1).get();
    if (!uSnap.empty) {
      currentUser = uSnap.docs[0].data();
      currentUser.id = uSnap.docs[0].id;
    } else {
      currentUser = { id: fu.uid, email: fu.email, name: fu.displayName || fu.email };
    }
  } catch(e) {
    currentUser = { id: fu.uid, email: fu.email, name: fu.displayName || fu.email };
  }

  // Render sidebar
  if (typeof renderSidebar === 'function') {
    document.getElementById('sidebar-mount').innerHTML = renderSidebar('expenses');
    if (typeof initSidebar === 'function') initSidebar();
  }

  await loadAll();
});

async function loadAll() {
  try {
    // 1. Load groups where current user is a member
    const myId    = currentUser.id;
    const myEmail = currentUser.email;

    const [byId, byEmail] = await Promise.all([
      _fs().collection('groups').where('members','array-contains', myId).get(),
      myEmail ? _fs().collection('groups').where('members','array-contains', myEmail).get() : Promise.resolve({ docs: [] })
    ]);

    const groupMap = {};
    [...byId.docs, ...byEmail.docs].forEach(d => { groupMap[d.id] = { id: d.id, ...d.data() }; });
    allGroups = Object.values(groupMap);

    if (!allGroups.length) {
      renderStats(); renderCharts(); populateFilters(); renderList();
      return;
    }

    // 2. Load all expenses for all groups in parallel
    const expSnaps = await Promise.all(
      allGroups.map(g => _fs().collection('expenses').where('groupId','==',g.id).get())
    );
    allExpenses = [];
    expSnaps.forEach((snap, i) => {
      const g = allGroups[i];
      snap.docs.forEach(d => {
        allExpenses.push({ id: d.id, ...d.data(), groupName: g.name, groupId: g.id });
      });
    });
    allExpenses.sort((a,b) => (b.date||b.createdAt||0) - (a.date||a.createdAt||0));

    // 3. Load user display names for payers
    const payerIds = [...new Set(allExpenses.map(e => e.paidBy).filter(Boolean))];
    if (payerIds.length) {
      // Firestore 'in' query limit is 30 — chunk it
      const chunks = [];
      for (let i = 0; i < payerIds.length; i += 30) chunks.push(payerIds.slice(i, i+30));
      for (const chunk of chunks) {
        // Try by doc ID
        const uSnap = await _fs().collection('users').where(firebase.firestore.FieldPath.documentId(),'in',chunk).get();
        uSnap.docs.forEach(d => { usersMap[d.id] = d.data(); });
        // Also try by email for any email-keyed payers
        const emailPayers = chunk.filter(p => p.includes('@') && !usersMap[p]);
        if (emailPayers.length) {
          for (const ep of emailPayers) {
            try {
              const es = await _fs().collection('users').where('email','==',ep).limit(1).get();
              if (!es.empty) usersMap[ep] = es.docs[0].data();
            } catch(_) {}
          }
        }
      }
    }

    renderStats();
    renderCharts();
    populateFilters();
    applyFilters();
  } catch(err) {
    console.error('loadAll error:', err);
    document.getElementById('expense-list').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load expenses</div><div class="empty-desc">${err.message}</div></div>`;
  }
}

// ── Stats ────────────────────────────────────────────────────────────────────
function renderStats() {
  const myId = currentUser.id, myEmail = currentUser.email;
  const nonSettle = allExpenses.filter(e => !e.isSettlement);

  const total   = nonSettle.reduce((s,e) => s + (+e.amount||0), 0);
  const myPaid  = nonSettle.filter(e => e.paidBy === myId || e.paidBy === myEmail).reduce((s,e) => s + (+e.amount||0), 0);
  const myShare = nonSettle.reduce((s,e) => {
    const sp = e.splits?.find(sp => sp.userId === myId || sp.userId === myEmail);
    return s + (sp ? +sp.amount : 0);
  }, 0);

  // Net balance = what I'm owed minus what I owe
  const netBal = myPaid - myShare;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Group Spend</div>
      <div class="stat-value stat-purple">${fmt(total)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Amount You Paid</div>
      <div class="stat-value">${fmt(myPaid)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Your Share</div>
      <div class="stat-value">${fmt(myShare)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Net Balance</div>
      <div class="stat-value" style="color:${netBal>=0?'var(--green,#22c55e)':'var(--red,#ef4444)'}">
        ${netBal>=0?'+':'−'}${fmt(Math.abs(netBal))}
      </div>
    </div>`;
}

// ── Charts ───────────────────────────────────────────────────────────────────
function renderCharts() {
  const nonSettle = allExpenses.filter(e => !e.isSettlement);

  // Category pie
  const byCat = {};
  nonSettle.forEach(e => { byCat[e.category] = (byCat[e.category]||0) + (+e.amount||0); });
  const catTotal  = Object.values(byCat).reduce((a,b)=>a+b,0);
  const catSorted = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,6);

  const catHtml = catSorted.length
    ? `<div class="pie-wrap">
        <svg width="90" height="90" viewBox="0 0 36 36">${buildPie(catSorted, catTotal)}</svg>
        <div class="pie-legend">${catSorted.map(([cat, amt]) => `
          <div class="pie-legend-item">
            <div class="pie-dot" style="background:${catColor(cat)}"></div>
            <div style="flex:1">${catLabel(cat)}</div>
            <div style="font-weight:700">${fmt(amt)}</div>
          </div>`).join('')}
        </div>
      </div>`
    : '<div class="empty-state" style="padding:20px"><div class="empty-icon">📊</div><div>No data yet</div></div>';
  document.getElementById('cat-chart').innerHTML = catHtml;

  // Monthly bar chart
  const byMonth = {};
  nonSettle.forEach(e => {
    const ts = e.date || e.createdAt;
    if (!ts) return;
    const d   = new Date(ts);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    byMonth[key] = (byMonth[key]||0) + (+e.amount||0);
  });
  const months = Object.keys(byMonth).sort().slice(-6);
  const maxVal = Math.max(...months.map(m => byMonth[m]), 1);

  const monthHtml = months.length
    ? `<div class="chart-bar-wrap">
        ${months.map(m => {
          const h     = Math.max((byMonth[m]/maxVal)*70, 4);
          const label = new Date(m+'-01').toLocaleDateString('en-IN',{month:'short'});
          return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px">
            <div class="chart-bar" style="height:${h}px;background:var(--accent);opacity:0.8" title="${fmt(byMonth[m])}"></div>
            <div style="font-size:0.65rem;color:var(--text3)">${label}</div>
          </div>`;
        }).join('')}
      </div>`
    : '<div class="empty-state" style="padding:20px"><div class="empty-icon">📈</div><div>No data yet</div></div>';
  document.getElementById('monthly-chart').innerHTML = monthHtml;
}

function buildPie(data, total) {
  if (!total) return '';
  let offset = 0;
  const r    = 15.9154943;
  const circ = 2 * Math.PI * r;
  return data.map(([cat, amt]) => {
    const pct  = (amt / total) * 100;
    const dash = (pct / 100) * circ;
    const gap  = circ - dash;
    const rot  = (offset / 100) * 360 - 90;
    offset += pct;
    return `<circle cx="18" cy="18" r="${r}" fill="none" stroke="${catColor(cat)}" stroke-width="3.5" stroke-dasharray="${dash} ${gap}" transform="rotate(${rot} 18 18)"/>`;
  }).join('');
}

// ── Filters ──────────────────────────────────────────────────────────────────
function populateFilters() {
  const gSel = document.getElementById('filter-group');
  gSel.innerHTML = '<option value="all">All Groups</option>';
  allGroups.forEach(g => { gSel.innerHTML += `<option value="${g.id}">${g.name}</option>`; });

  const cSel = document.getElementById('filter-cat');
  cSel.innerHTML = '<option value="all">All Categories</option>';
  const cats = [...new Set(allExpenses.filter(e=>!e.isSettlement).map(e => e.category).filter(Boolean))];
  cats.forEach(c => { cSel.innerHTML += `<option value="${c}">${catLabel(c)}</option>`; });

  const mSel = document.getElementById('filter-month');
  mSel.innerHTML = '<option value="all">All Time</option>';
  const months = [...new Set(allExpenses.map(e => {
    const ts = e.date || e.createdAt;
    if (!ts) return null;
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }).filter(Boolean))].sort().reverse();
  months.forEach(m => {
    const label = new Date(m+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'});
    mSel.innerHTML += `<option value="${m}">${label}</option>`;
  });
}

function applyFilters() {
  const gFilter = document.getElementById('filter-group').value;
  const cFilter = document.getElementById('filter-cat').value;
  const mFilter = document.getElementById('filter-month').value;

  filtered = allExpenses.filter(e => {
    if (gFilter !== 'all' && e.groupId !== gFilter) return false;
    if (cFilter !== 'all' && e.category !== cFilter) return false;
    if (mFilter !== 'all') {
      const ts = e.date || e.createdAt;
      if (!ts) return false;
      const d   = new Date(ts);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (key !== mFilter) return false;
    }
    return true;
  });

  document.getElementById('result-count').textContent =
    `${filtered.length} expense${filtered.length !== 1 ? 's' : ''}`;
  renderList();
}

function clearFilters() {
  document.getElementById('filter-group').value = 'all';
  document.getElementById('filter-cat').value   = 'all';
  document.getElementById('filter-month').value = 'all';
  applyFilters();
}

// ── List ─────────────────────────────────────────────────────────────────────
function payerName(paidBy) {
  const myId    = currentUser.id, myEmail = currentUser.email;
  if (paidBy === myId || paidBy === myEmail) return 'You';
  const u = usersMap[paidBy];
  if (u) return u.name || u.email || paidBy;
  return paidBy.includes('@') ? paidBy.split('@')[0] : paidBy.slice(0,8);
}

function renderList() {
  const el = document.getElementById('expense-list');
  const myId = currentUser.id, myEmail = currentUser.email;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">💸</div>
      <div class="empty-title">${allExpenses.length ? 'No expenses match your filters' : 'No expenses yet'}</div>
      <div class="empty-desc">${allExpenses.length ? 'Try adjusting your filters' : 'Add your first expense to a group to see it here'}</div>
    </div>`;
    return;
  }

  // Group by month
  const byMonth = {};
  filtered.forEach(e => {
    const ts  = e.date || e.createdAt || 0;
    const d   = new Date(ts);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(e);
  });

  let html = '';
  Object.keys(byMonth).sort().reverse().forEach(month => {
    const label      = new Date(month+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'});
    const monthTotal = byMonth[month].filter(e=>!e.isSettlement).reduce((s,e) => s+(+e.amount||0), 0);
    html += `<div class="month-header">${label} <span style="color:var(--text3);font-weight:400;font-size:0.75rem">— ${fmt(monthTotal)}</span></div>`;

    byMonth[month].forEach(e => {
      const iPaid   = e.paidBy === myId || e.paidBy === myEmail;
      const myShare = e.splits?.find(s => s.userId === myId || s.userId === myEmail);
      let shareColor = 'var(--text3)', shareText = '';

      if (e.isSettlement) {
        shareColor = 'var(--green,#22c55e)'; shareText = 'Settlement';
      } else if (iPaid) {
        shareColor = 'var(--green,#22c55e)';
        shareText  = myShare ? `You paid · your share ${fmt(myShare.amount)}` : 'You paid';
      } else if (myShare) {
        shareColor = 'var(--red,#ef4444)';
        shareText  = `Your share: ${fmt(myShare.amount)}`;
      }

      html += `<div class="expense-full-row">
        <div style="font-size:1.5rem;width:36px;text-align:center;flex-shrink:0">${e.isSettlement ? '✅' : catIcon(e.category)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:0.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.description || '—'}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap">
            ${shareText ? `<span style="font-size:0.75rem;color:${shareColor}">${shareText}</span>` : ''}
            <span class="exp-group-tag">📁 ${e.groupName || '—'}</span>
            <span style="font-size:0.72rem;color:var(--text3)">${fmtDate(e.date || e.createdAt)}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:var(--font-display);font-weight:700">${fmt(e.amount)}</div>
          <div style="font-size:0.72rem;color:var(--text3)">${payerName(e.paidBy)}</div>
        </div>
      </div>`;
    });
  });

  el.innerHTML = html;
}
</script>
</body>
</html>
