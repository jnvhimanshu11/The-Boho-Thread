# Server
server.port=8080
server.servlet.context-path=/api

# H2 Database (Development)
spring.datasource.url=jdbc:h2:file:./schoolwala-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=schoolwala123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
schoolwala.jwt.secret=SchoolWala_Super_Secret_JWT_Key_2024_@#$_Production_Grade_256bits_minimum
schoolwala.jwt.expiration=86400000
# 24 hours in ms

# CORS
schoolwala.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:5173

# File Upload (school logos)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
schoolwala.upload.dir=uploads/logos

# Logging
logging.level.com.schoolwala=DEBUG
logging.level.org.springframework.security=WARN

