# Server
server.port=8080
server.servlet.context-path=/api

# PostgreSQL Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
schoolwala.jwt.secret=SchoolWala_Super_Secret_JWT_Key_2024_@#$_Production_Grade_256bits_minimum
schoolwala.jwt.expiration=86400000

# CORS - added your exact frontend URL
schoolwala.cors.allowed-origins=http://localhost:5173,https://the-boho-thread-frontend.onrender.com,https://the-boho-thread-frontend-gsc7.onrender.com,https://thebohothread.in,https://www.thebohothread.in

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
schoolwala.upload.dir=uploads/logos

# Logging
logging.level.com.schoolwala=DEBUG
logging.level.org.springframework.security=WARN

# Large request body support (for base64 logo uploads)
spring.mvc.pathmatch.use-suffix-pattern=false
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=-1
spring.mvc.async.request-timeout=60000
spring.jackson.max-string-length=-1

# Super Admin API Key - set SUPER_ADMIN_KEY as environment variable on Render
schoolwala.superadmin.api-key=${SUPER_ADMIN_KEY:schoolwala-super-secret-2024}