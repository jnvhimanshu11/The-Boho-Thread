# Server
server.port=8080
server.servlet.context-path=/api

# PostgreSQL Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
schoolwala.jwt.secret=SchoolWala_Super_Secret_JWT_Key_2024_@#$_Production_Grade_256bits_minimum
schoolwala.jwt.expiration=86400000

# CORS — update this after frontend is deployed
schoolwala.cors.allowed-origins=http://localhost:5173,https://the-boho-thread-frontend.onrender.com

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
schoolwala.upload.dir=uploads/logos

# Logging
logging.level.com.schoolwala=DEBUG
logging.level.org.springframework.security=WARN