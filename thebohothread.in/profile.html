<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — SplitMate</title>
<link rel="stylesheet" href="style.css">
<style>
.profile-hero { background: linear-gradient(135deg, var(--surface) 0%, var(--bg3) 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
.avatar-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all var(--transition); }
.color-dot:hover { transform: scale(1.15); }
.color-dot.selected { border-color: white; transform: scale(1.15); }
.profile-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.danger-zone { border-color: rgba(239,68,68,0.3); }
.danger-zone .card-title { color: var(--red); }
@media (max-width: 700px) { .profile-two-col { grid-template-columns: 1fr; } .profile-hero { flex-direction: column; text-align: center; } }
</style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="page-wrap">
  <div class="main-content">
    <div class="page-header">
      <div class="page-title">My Profile</div>
      <div class="page-subtitle">Manage your account and preferences</div>
    </div>

    <!-- HERO -->
    <div class="profile-hero" id="profile-hero"></div>

    <div class="profile-two-col">
      <!-- LEFT COL -->
      <div>
        <!-- EDIT PROFILE -->
        <div class="card mb-4">
          <h3 style="margin-bottom:16px">Edit Profile</h3>
          <div id="profile-alert"></div>
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="edit-name" class="form-input" autocomplete="name">
          </div>
         
          <button class="btn btn-primary mt-4" onclick="saveProfile()">Save Changes</button>
        </div>


      </div>

      <!-- RIGHT COL -->
      <div>
        <!-- STATS -->
        <div class="card mb-4">
          <h3 style="margin-bottom:16px">Your Stats</h3>
          <div id="user-stats"></div>
        </div>

        <!-- MY GROUPS -->
        <div class="card mb-4">
          <div class="flex-between mb-3">
            <h3>My Groups</h3>
            <a href="dashboard.html" class="text-sm" style="color:var(--accent2)">View all →</a>
          </div>
          <div id="my-groups-list"></div>
        </div>

        <!-- DANGER ZONE -->
        <div class="card danger-zone">
          <h3 style="color:var(--red);margin-bottom:12px">⚠️ Danger Zone</h3>
          <p style="font-size:0.85rem;margin-bottom:16px">These actions are irreversible. Please be careful.</p>
          <button class="btn btn-secondary btn-sm" onclick="exportData()">📤 Export My Data</button>
          <button class="btn btn-danger btn-sm mt-2" onclick="deleteAccount()">🗑️ Delete Account</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyCLz4cXKGxILS5Use2KPe4XaUnLRhcrIyg",
    authDomain:        "thebohothread-96e2c.firebaseapp.com",
    projectId:         "thebohothread-96e2c",
    storageBucket:     "thebohothread-96e2c.firebasestorage.app",
    messagingSenderId: "100688387088",
    appId:             "1:100688387088:web:f8a6af7565d3c25952fe95",
    measurementId:     "G-5VTK93354M"
  };
  firebase.initializeApp(firebaseConfig);
</script>
<script src="db.firestore.js"></script>
<script src="auth.js"></script>
<script>
const user = Auth.requireAuth();
const AVATAR_COLORS = ['#6c63ff','#22c55e','#f97316','#ef4444','#3b82f6','#a855f7','#14b8a6','#f59e0b','#ec4899','#06b6d4','#84cc16','#d946ef'];
let selectedColor = '';

if (user) init();

function init() {
  document.getElementById('sidebar-mount').innerHTML = renderSidebar('profile');
  initSidebar();
  selectedColor = user.avatarColor || AVATAR_COLORS[0];
  renderHero();
  renderEditForm();
  renderAvatarPicker();
  renderStats();
  renderGroups();
}

function renderHero() {
  const groups = DB.groups.forUser(user.id);
  let netBal = 0;
  groups.forEach(g => { netBal += DB.calc.userBalanceInGroup(g.id, user.id); });
  const balColor = netBal > 0 ? 'var(--green)' : netBal < 0 ? 'var(--red)' : 'var(--text2)';
  const member_since = new Date(user.createdAt || Date.now()).toLocaleDateString('en-IN', { month:'long', year:'numeric' });

  document.getElementById('profile-hero').innerHTML = `
    <div class="avatar avatar-xl" id="hero-avatar" style="background:${user.avatarColor||'#6c63ff'};font-size:2rem">${initials(user.name)}</div>
    <div style="flex:1">
      <h2 style="margin-bottom:4px">${user.name}</h2>
      <div style="color:var(--text3);font-size:0.88rem;margin-bottom:12px">${user.email}</div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:1.2rem">${groups.length}</div>
          <div style="font-size:0.75rem;color:var(--text3)">Groups</div>
        </div>
        <div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:1.2rem;color:${balColor}">${netBal>=0?'+':''}${formatCurrency(netBal)}</div>
          <div style="font-size:0.75rem;color:var(--text3)">Net Balance</div>
        </div>
        <div>
          <div style="font-size:0.82rem;color:var(--text3)">Member since</div>
          <div style="font-size:0.85rem;font-weight:600">${member_since}</div>
        </div>
      </div>
    </div>`;
}

function renderEditForm() {
  const nameEl = document.getElementById('edit-name');

  if (nameEl) nameEl.value = user.name || '';
  if (emailEl) emailEl.value = user.email || '';
}

function renderAvatarPicker() {
  const picker = document.getElementById('avatar-picker');
  if (!picker) return;
  picker.innerHTML = AVATAR_COLORS.map(c =>
    `<div class="color-dot${c===selectedColor?' selected':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(color) {
  selectedColor = color;
  renderAvatarPicker();
  // Live preview
  const heroAvatar = document.getElementById('hero-avatar');
  if (heroAvatar) heroAvatar.style.background = color;
  const sidebarAvatar = document.getElementById('sidebar-avatar');
  if (sidebarAvatar) sidebarAvatar.style.background = color;
}

async function saveProfile() {
  const name = document.getElementById('edit-name').value.trim();
  if (!name) { setAlert('profile-alert', 'Name is required', 'error'); return; }
  await DB.users.update(user.id, { name, avatarColor: selectedColor });
  const updated = await DB.users.findById(user.id);
  Auth.setSession(updated);
  setAlert('profile-alert', 'Profile updated successfully!', 'ok');
  renderHero();
  initSidebar();
}



function setAlert(id, msg, type) {
  document.getElementById(id).innerHTML = `<div class="alert alert-${type==='ok'?'success':'error'}" style="margin-bottom:12px">${msg}</div>`;
  setTimeout(() => { const el = document.getElementById(id); if (el) el.innerHTML = ''; }, 4000);
}

function renderStats() {
  const groups = DB.groups.forUser(user.id);
  let totalPaid = 0, totalOwed = 0, totalOwe = 0, expenseCount = 0;
  groups.forEach(g => {
    const exps = DB.expenses.forGroup(g.id);
    expenseCount += exps.filter(e => !e.isSettlement && (e.paidBy === user.id || e.splits?.some(s => s.userId === user.id))).length;
    exps.filter(e => !e.isSettlement && e.paidBy === user.id).forEach(e => { totalPaid += e.amount; });
    const bal = DB.calc.userBalanceInGroup(g.id, user.id);
    if (bal > 0) totalOwed += bal;
    else totalOwe += Math.abs(bal);
  });

  // Category breakdown
  const allExp = [];
  groups.forEach(g => DB.expenses.forGroup(g.id).filter(e=>!e.isSettlement && e.paidBy===user.id).forEach(e => allExp.push(e)));
  const byCat = {};
  allExp.forEach(e => { byCat[e.category] = (byCat[e.category]||0) + e.amount; });
  const topCats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,3);

  document.getElementById('user-stats').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:14px;text-align:center">
        <div style="font-family:var(--font-display);font-weight:700;font-size:1.3rem;color:var(--green)">${formatCurrency(totalOwed)}</div>
        <div style="font-size:0.72rem;color:var(--text3)">owed to you</div>
      </div>
      <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:14px;text-align:center">
        <div style="font-family:var(--font-display);font-weight:700;font-size:1.3rem;color:var(--red)">${formatCurrency(totalOwe)}</div>
        <div style="font-size:0.72rem;color:var(--text3)">you owe</div>
      </div>
      <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:14px;text-align:center">
        <div style="font-family:var(--font-display);font-weight:700;font-size:1.3rem;color:var(--accent2)">${formatCurrency(totalPaid)}</div>
        <div style="font-size:0.72rem;color:var(--text3)">total paid</div>
      </div>
      <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:14px;text-align:center">
        <div style="font-family:var(--font-display);font-weight:700;font-size:1.3rem">${expenseCount}</div>
        <div style="font-size:0.72rem;color:var(--text3)">expenses</div>
      </div>
    </div>
    ${topCats.length ? `<div style="font-size:0.78rem;color:var(--text3);margin-bottom:8px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase">Top Categories</div>` +
    topCats.map(([cat, amt]) => `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:1.1rem">${categoryIcon(cat)}</span>
        <div style="flex:1">
          <div style="font-size:0.82rem;font-weight:500">${categoryLabel(cat)}</div>
          <div class="progress" style="margin-top:4px">
            <div class="progress-fill" style="width:${(amt/totalPaid*100)||0}%;background:${categoryColor(cat)}"></div>
          </div>
        </div>
        <div style="font-size:0.82rem;font-weight:700">${formatCurrency(amt)}</div>
      </div>`).join('') : ''}`;
}

function renderGroups() {
  const groups = DB.groups.forUser(user.id);
  const catIcons = { trip:'✈️', home:'🏠', friends:'👫', couple:'💑', work:'💼', other:'📦' };

  if (!groups.length) {
    document.getElementById('my-groups-list').innerHTML = `<div class="empty-state" style="padding:20px"><div class="empty-icon">👥</div><div>No groups yet</div></div>`;
    return;
  }

  document.getElementById('my-groups-list').innerHTML = groups.map(g => {
    const bal = DB.calc.userBalanceInGroup(g.id, user.id);
    const balColor = bal > 0 ? 'var(--green)' : bal < 0 ? 'var(--red)' : 'var(--text2)';
    return `<a href="group.html?id=${g.id}" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text)">
      <div style="font-size:1.3rem">${catIcons[g.category]||'📦'}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:0.9rem">${g.name}</div>
        <div style="font-size:0.75rem;color:var(--text3)">${g.members.length} members</div>
      </div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:0.88rem;color:${balColor}">${bal>=0?'+':''}${formatCurrency(bal)}</div>
    </a>`;
  }).join('');
}

function exportData() {
  const data = {
    user: { name: user.name, email: user.email, createdAt: user.createdAt },
    groups: DB.groups.forUser(user.id).map(g => ({
      ...g,
      expenses: DB.expenses.forGroup(g.id)
    }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `splitmate-export-${user.name.replace(/\s+/g,'-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported!', 'success');
}

function deleteAccount() {
  if (!confirm('Are you absolutely sure you want to delete your account? This will remove all your data and cannot be undone.')) return;
  if (!confirm('This is irreversible. Type OK to confirm deletion.')) return;
  // Remove from all groups
  DB.groups.forUser(user.id).forEach(g => {
    if (g.createdBy === user.id) DB.groups.delete(g.id);
  });
  // Clear session
  Auth.clearSession();
  localStorage.removeItem('splitmate_db');
  location.href = 'index.html';
}
</script>
</body>
</html>
