<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — SplitMate</title>
<link rel="stylesheet" href="style.css">
<style>
html { scroll-behavior: smooth; }
.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.group-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all var(--transition); text-decoration: none; display: block; color: var(--text); }
.group-card:hover { border-color: var(--border2); transform: translateY(-3px); box-shadow: var(--shadow); }
.group-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.group-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
.group-name { font-family: var(--font-display); font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
.group-desc { font-size: 0.78rem; color: var(--text3); }
.group-stats { display: flex; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.group-stat { text-align: center; }
.group-stat-val { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; }
.group-stat-label { font-size: 0.7rem; color: var(--text3); margin-top: 1px; }
.dash-three-dot {
  position: absolute; top: 10px; right: 10px;
  background: transparent; border: none; color: var(--text3);
  font-size: 1.2rem; cursor: pointer; border-radius: 6px;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; line-height: 1; z-index: 3;
}
.dash-three-dot:hover { background: var(--border); color: var(--text); }
.dash-dropdown {
  position: absolute; top: 36px; right: 8px;
  background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200; min-width: 160px;
  overflow: hidden; display: none;
}
.dash-dropdown.open { display: block; }
.dash-dd-item {
  padding: 10px 16px; font-size: 0.85rem; cursor: pointer;
  transition: background 0.1s; display: flex; align-items: center; gap: 8px; color: var(--text);
}
.dash-dd-item:hover { background: var(--border); }
.dash-dd-item.danger { color: #ef4444; }
.dash-dd-item.danger:hover { background: rgba(239,68,68,0.08); }
.group-card { position: relative !important; }
.new-group-card:hover { border-color: var(--accent); color: var(--accent2); background: rgba(108,99,255,0.05); }
.activity-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.activity-item:last-child { border-bottom: none; }
.activity-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; }
.activity-text { flex: 1; }
.activity-title { font-size: 0.88rem; font-weight: 500; }
.activity-sub { font-size: 0.75rem; color: var(--text3); }
.activity-amount { font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; text-align: right; }
</style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="page-wrap">
  <div class="main-content" id="main">
    <div class="page-header">
      <div class="page-header-row">
        <div>
          <div class="page-title" id="greeting">Good morning! 👋</div>
          <div class="page-subtitle">Here's your expense overview</div>
        </div>
        <button class="btn btn-primary" onclick="openModal('new-group-modal')">
          + New Group
        </button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid" id="stats-grid"></div>

    <!-- GROUPS: id="groups" is the scroll anchor for sidebar "My Groups" link -->
    <div class="mb-4" id="groups">
      <div class="flex-between mb-3">
        <h3>My Groups</h3>
        <span id="group-count" class="text-sm text-muted"></span>
      </div>
      <div class="group-grid" id="group-grid">
        <div style="color:var(--text3);padding:16px">Loading groups…</div>
      </div>
    </div>

    <!-- RECENT ACTIVITY -->
    <div class="card mt-4">
      <div class="flex-between mb-3">
        <h3>Recent Activity</h3>
        <a href="expenses.html" class="text-sm" style="color:var(--accent2)">View all →</a>
      </div>
      <div id="activity-list"></div>
    </div>
  </div>
</div>

<!-- EDIT GROUP MODAL (dashboard) -->
<div class="modal-overlay" id="dash-edit-group-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Group</div>
      <button class="modal-close" onclick="closeModal('dash-edit-group-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Group name *</label>
      <input type="text" id="dg-name" class="form-input" placeholder="e.g. Goa Trip, Flat Expenses">
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select id="dg-cat" class="form-select">
        <option value="trip">✈️ Trip</option>
        <option value="home">🏠 Home / Flat</option>
        <option value="friends">👫 Friends</option>
        <option value="couple">💑 Couple</option>
        <option value="work">💼 Work</option>
        <option value="other">📦 Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Description (optional)</label>
      <input type="text" id="dg-desc" class="form-input" placeholder="Brief description">
    </div>
    <div class="flex gap-3 mt-4">
      <button class="btn btn-secondary flex-1" onclick="closeModal('dash-edit-group-modal')">Cancel</button>
      <button class="btn btn-primary flex-1" onclick="saveDashEditGroup()">Save Changes</button>
    </div>
  </div>
</div>

<!-- NEW GROUP MODAL -->
<div class="modal-overlay" id="new-group-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Create New Group</div>
      <button class="modal-close" onclick="closeModal('new-group-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Group name *</label>
      <input type="text" id="ng-name" class="form-input" placeholder="e.g. Goa Trip, Flat Expenses">
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select id="ng-category" class="form-select">
        <option value="trip">✈️ Trip</option>
        <option value="home">🏠 Home / Flat</option>
        <option value="friends">👫 Friends</option>
        <option value="couple">💑 Couple</option>
        <option value="work">💼 Work</option>
        <option value="other">📦 Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Description (optional)</label>
      <input type="text" id="ng-desc" class="form-input" placeholder="Brief description">
    </div>
    <div class="flex gap-3 mt-4">
      <button class="btn btn-secondary flex-1" onclick="closeModal('new-group-modal')">Cancel</button>
      <button class="btn btn-primary flex-1" id="create-group-btn" onclick="createGroup()">Create Group</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyCLz4cXKGxILS5Use2KPe4XaUnLRhcrIyg",
    authDomain:        "thebohothread-96e2c.firebaseapp.com",
    projectId:         "thebohothread-96e2c",
    storageBucket:     "thebohothread-96e2c.firebasestorage.app",
    messagingSenderId: "100688387088",
    appId:             "1:100688387088:web:f8a6af7565d3c25952fe95",
    measurementId:     "G-5VTK93354M"
  };
  firebase.initializeApp(firebaseConfig);
</script>
<script src="db.firestore.js"></script>
<script src="auth.js"></script>
<script>
// FIX 1: 'currentUser' was undefined — Auth.requireAuth() returns the user object
const currentUser = Auth.requireAuth();
if (!currentUser) { window.location.href = 'index.html'; }

init();

async function init() {
  document.getElementById('sidebar-mount').innerHTML = renderSidebar('dashboard');
  initSidebar();
  renderGreeting();

  // FIX 2: All DB calls are async (Firestore) — load in parallel where possible
  try {
    await renderGroups();
    await renderStats();
    await renderActivity();
  } catch(err) {
    console.error('Dashboard load error:', err);
  }

  // FIX 3: Scroll to #groups section if sidebar link was clicked
  if (window.location.hash === '#groups') {
    setTimeout(() => {
      document.getElementById('groups')?.scrollIntoView({ behavior: 'smooth' });
    }, 200);
  }
}

function renderGreeting() {
  const h = new Date().getHours();
  const time = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  // FIX: use 'currentUser' not undefined 'user'
  document.getElementById('greeting').textContent = time + ', ' + (currentUser.name || '').split(' ')[0] + '! 👋';
}

async function renderStats() {
  const groups = await DB.groups.forUser(currentUser.id);
  let totalOwed = 0, totalOwe = 0, totalSpent = 0;
  for (const g of groups) {
    const bal   = await DB.calc.userBalanceInGroup(g.id, currentUser.id);
    const stats = await DB.calc.groupStats(g.id);
    if (bal > 0) totalOwed += bal;
    else if (bal < 0) totalOwe += Math.abs(bal);
    totalSpent += stats.total;
  }
  document.getElementById('stats-grid').innerHTML =
    '<div class="stat-card"><div class="stat-label">You are owed</div><div class="stat-value stat-green">' + formatCurrency(totalOwed) + '</div><div class="stat-sub">across ' + groups.length + ' group' + (groups.length!==1?'s':'') + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">You owe</div><div class="stat-value stat-red">' + formatCurrency(totalOwe) + '</div><div class="stat-sub">settle up soon</div></div>' +
    '<div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value stat-purple">' + formatCurrency(totalSpent) + '</div><div class="stat-sub">all time</div></div>' +
    '<div class="stat-card"><div class="stat-label">Groups</div><div class="stat-value">' + groups.length + '</div><div class="stat-sub">active groups</div></div>';
}

async function renderGroups() {
  if (!currentUser || !currentUser.id) {
    console.error('renderGroups: currentUser or currentUser.id is missing', currentUser);
    document.getElementById('group-grid').innerHTML = '<div style="color:red;padding:16px">Session error — please sign out and sign in again.</div>';
    return;
  }
  console.log('Loading groups for user id:', currentUser.id);
  const groups = await DB.groups.forUser(currentUser.id);
  console.log('Groups loaded:', groups.length, groups);
  document.getElementById('group-count').textContent = groups.length + ' group' + (groups.length!==1?'s':'');
  const catIcons  = { trip:'✈️', home:'🏠', friends:'👫', couple:'💑', work:'💼', other:'📦' };
  const catColors = { trip:'rgba(108,99,255,0.15)', home:'rgba(34,197,94,0.15)', friends:'rgba(249,115,22,0.15)', couple:'rgba(236,72,153,0.15)', work:'rgba(59,130,246,0.15)', other:'rgba(168,85,247,0.15)' };

  let html = '';
  for (const g of groups) {
    const bal   = await DB.calc.userBalanceInGroup(g.id, currentUser.id);
    const stats = await DB.calc.groupStats(g.id);
    const balColor = bal > 0 ? 'var(--green)' : bal < 0 ? 'var(--red)' : 'var(--text2)';
    const balLabel = bal > 0 ? 'You get back ' + formatCurrency(bal) : bal < 0 ? 'You owe ' + formatCurrency(Math.abs(bal)) : 'Settled up ✓';
    html += '<div class="group-card" style="position:relative;display:block;color:inherit">' +
      '<button class="dash-three-dot" onclick="event.preventDefault();event.stopPropagation();toggleDashMenu(event,\'' + g.id + '\')" title="Options">⋮</button>' +
      '<div class="dash-dropdown" id="ddash-' + g.id + '">' +
        '<div class="dash-dd-item" onclick="openDashEditGroup(\'' + g.id + '\')">✏️ Edit Group</div>' +
      '</div>' +
      '<div onclick="window.location.href=\'pages/group-detail.html?id=' + g.id + '\'" style="cursor:pointer">' +
      '<div class="group-card-header"><div class="group-icon" style="background:' + (catColors[g.category]||catColors.other) + '">' + (catIcons[g.category]||'📦') + '</div>' +
      '<span class="badge badge-gray">' + g.members.length + ' member' + (g.members.length!==1?'s':'') + '</span></div>' +
      '<div class="group-name">' + g.name + '</div>' +
      '<div class="group-desc">' + (g.description || '') + '</div>' +
      '<div class="group-stats">' +
        '<div class="group-stat"><div class="group-stat-val">' + formatCurrency(stats.total) + '</div><div class="group-stat-label">Total spent</div></div>' +
        '<div class="group-stat"><div class="group-stat-val">' + stats.count + '</div><div class="group-stat-label">Expenses</div></div>' +
        '<div class="group-stat"><div class="group-stat-val" style="color:' + balColor + ';font-size:0.78rem">' + balLabel + '</div><div class="group-stat-label">Your balance</div></div>' +
      '</div></div></div>';
  }
  html += '<div class="new-group-card" onclick="openModal(\'new-group-modal\')">' +
    '<div style="font-size:2rem">➕</div><div style="font-weight:600">Create New Group</div>' +
    '<div class="text-sm">Start tracking expenses</div></div>';
  document.getElementById('group-grid').innerHTML = html;
}

async function renderActivity() {
  const groups = await DB.groups.forUser(currentUser.id);
  const allExpenses = [];
  for (const g of groups) {
    try {
      // FIX 4: Query without .orderBy() to avoid Firestore composite index requirement.
      // Sort client-side instead.
      const snap = await firebase.firestore().collection('expenses')
        .where('groupId', '==', g.id).get();
      snap.docs.forEach(d => allExpenses.push(Object.assign({}, d.data(), { groupName: g.name })));
    } catch(e) { console.warn('expenses load error for group', g.id, e); }
  }
  allExpenses.sort(function(a, b) { return b.date - a.date; });
  const recent = allExpenses.slice(0, 8);

  if (!recent.length) {
    document.getElementById('activity-list').innerHTML =
      '<div class="empty-state"><div class="empty-icon">💸</div><div class="empty-title">No activity yet</div><div class="empty-desc">Create a group and add your first expense</div></div>';
    return;
  }
  document.getElementById('activity-list').innerHTML = recent.map(function(e) {
    var myShare = e.splits && e.splits.find(function(s) { return s.userId === currentUser.id; });
    var iPaid = e.paidBy === currentUser.id;
    var amtHtml = '';
    if (e.isSettlement) amtHtml = '<div class="activity-amount" style="color:var(--green)">Settled</div>';
    else if (iPaid)     amtHtml = '<div class="activity-amount" style="color:var(--green)">+' + formatCurrency(e.amount) + '</div>';
    else if (myShare)   amtHtml = '<div class="activity-amount" style="color:var(--red)">-' + formatCurrency(myShare.amount) + '</div>';
    return '<div class="activity-item">' +
      '<div class="activity-icon" style="background:' + categoryColor(e.category) + '22">' + categoryIcon(e.category) + '</div>' +
      '<div class="activity-text"><div class="activity-title">' + e.description + '</div>' +
      '<div class="activity-sub">' + e.groupName + ' • ' + timeAgo(e.date) + '</div></div>' +
      amtHtml + '</div>';
  }).join('');
}

async function createGroup() {
  const name = document.getElementById('ng-name').value.trim();
  if (!name) { showToast('Group name is required', 'error'); return; }
  const btn = document.getElementById('create-group-btn');
  btn.disabled = true;
  btn.textContent = 'Creating…';
  try {
    const cat  = document.getElementById('ng-category').value;
    const desc = document.getElementById('ng-desc').value.trim();
    await DB.groups.create(name, desc, cat, currentUser.id);
    // Close modal and clear fields BEFORE re-rendering
    closeModal('new-group-modal');
    document.getElementById('ng-name').value = '';
    document.getElementById('ng-desc').value = '';
    // Re-render first, then show toast — errors in render won't trigger failure toast
    await renderGroups();
    await renderStats();
    showToast('Group created! 🎉', 'success');
  } catch(err) {
    console.error('Create group error:', err);
    // Only show failure toast if the group itself failed to save
    showToast('Failed to create group: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Group';
  }
}

document.getElementById('new-group-modal').addEventListener('click', function(e) {
  if (e.target.id === 'new-group-modal') closeModal('new-group-modal');
});

// ── 3-dot menu for group cards on dashboard ─────────────────────────────
function toggleDashMenu(e, groupId) {
  e.stopPropagation();
  var menu = document.getElementById('ddash-' + groupId);
  var wasOpen = menu.classList.contains('open');
  document.querySelectorAll('.dash-dropdown.open').forEach(function(m) { m.classList.remove('open'); });
  if (!wasOpen) menu.classList.add('open');
}

// Close dropdowns when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.dash-three-dot') && !e.target.closest('.dash-dropdown')) {
    document.querySelectorAll('.dash-dropdown.open').forEach(function(m) { m.classList.remove('open'); });
  }
});

// ── Edit Group from Dashboard ────────────────────────────────────────────
var _editingGroupId = null;
var _allGroupsCache = [];

async function openDashEditGroup(groupId) {
  document.querySelectorAll('.dash-dropdown.open').forEach(function(m) { m.classList.remove('open'); });
  if (!_allGroupsCache.length) {
    _allGroupsCache = await DB.groups.forUser(currentUser.id);
  }
  var g = _allGroupsCache.find(function(x) { return x.id === groupId; });
  if (!g) return;
  _editingGroupId = groupId;
  document.getElementById('dg-name').value = g.name || '';
  document.getElementById('dg-desc').value = g.description || '';
  document.getElementById('dg-cat').value = g.category || 'trip';
  openModal('dash-edit-group-modal');
  document.getElementById('dg-name').focus();
}

async function saveDashEditGroup() {
  var name = document.getElementById('dg-name').value.trim();
  var desc = document.getElementById('dg-desc').value.trim();
  var cat  = document.getElementById('dg-cat').value;
  if (!name) { showToast('Group name is required', 'error'); return; }
  if (!_editingGroupId) return;
  try {
    await firebase.firestore().collection('groups').doc(_editingGroupId).update({
      name: name, description: desc, category: cat, updatedAt: Date.now()
    });
    closeModal('dash-edit-group-modal');
    showToast('Group updated ✓', 'success');
    _allGroupsCache = [];
    await renderGroups();
  } catch(err) {
    showToast('Failed to update: ' + err.message, 'error');
  }
}

document.getElementById('dash-edit-group-modal').addEventListener('click', function(e) {
  if (e.target.id === 'dash-edit-group-modal') closeModal('dash-edit-group-modal');
});
</script>
</body>
</html>
