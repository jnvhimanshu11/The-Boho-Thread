<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity – SplitEase</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/landing.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .activity-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .filter-chip {
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-chip.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent-bright); }
    .activity-date-header {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
      padding: 16px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
  </style>
</head>
<body class="app-layout">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">All Activity</h1>
      <p class="page-subtitle">Complete history of expenses across all your groups</p>
    </div>

    <!-- Filters -->
    <div class="activity-filters">
      <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
      <button class="filter-chip" onclick="setFilter('food',this)">🍽️ Food</button>
      <button class="filter-chip" onclick="setFilter('transport',this)">🚗 Transport</button>
      <button class="filter-chip" onclick="setFilter('accommodation',this)">🏨 Hotel</button>
      <button class="filter-chip" onclick="setFilter('shopping',this)">🛍️ Shopping</button>
      <button class="filter-chip" onclick="setFilter('entertainment',this)">🎬 Entertainment</button>
      <button class="filter-chip" onclick="setFilter('other',this)">📦 Other</button>
      <input type="text" class="form-input" id="search-activity" placeholder="Search..." style="max-width:200px;margin-left:auto" oninput="renderActivity()" />
    </div>

    <!-- Summary stats -->
    <div class="stats-grid" id="activity-stats" style="margin-bottom:24px"></div>

    <!-- Activity list -->
    <div class="card" id="activity-list" style="padding:0 20px"></div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    let currentUser;
    let activeFilter = 'all';
    let allExpenses = [];
    let groupMap = {};

    document.addEventListener('DOMContentLoaded', () => {
      currentUser = Auth.requireAuth('../index.html');
      if (!currentUser) return;
      Sidebar.init('activity');

      const groups = DB.getGroupsForUser(currentUser.email);
      groups.forEach(g => { groupMap[g.id] = g; });
      allExpenses = [];
      groups.forEach(g => {
        DB.getExpensesForGroup(g.id).forEach(e => allExpenses.push({ ...e, group: g }));
      });
      allExpenses.sort((a, b) => b.createdAt - a.createdAt);

      renderStats();
      renderActivity();
    });

    function setFilter(cat, btn) {
      activeFilter = cat;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderActivity();
    }

    function renderStats() {
      const total = allExpenses.reduce((s, e) => s + e.amount, 0);
      const myPaid = allExpenses.filter(e => e.paidBy === currentUser.email).reduce((s, e) => s + e.amount, 0);
      const myShare = allExpenses.reduce((s, e) => s + (e.splits?.[currentUser.email] || 0), 0);

      document.getElementById('activity-stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Expenses</div>
          <div class="stat-value">${allExpenses.length}</div>
          <div class="stat-sub">across all groups</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Spent</div>
          <div class="stat-value">${UI.formatAmount(total)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">You Paid</div>
          <div class="stat-value text-accent">${UI.formatAmount(myPaid)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Your Share</div>
          <div class="stat-value text-red">${UI.formatAmount(myShare)}</div>
        </div>`;
    }

    function renderActivity() {
      const query = (document.getElementById('search-activity')?.value || '').toLowerCase();
      const users = Auth.getUsers();

      let filtered = allExpenses;
      if (activeFilter !== 'all') filtered = filtered.filter(e => e.category === activeFilter);
      if (query) filtered = filtered.filter(e =>
        e.description.toLowerCase().includes(query) ||
        e.group.name.toLowerCase().includes(query)
      );

      const list = document.getElementById('activity-list');

      if (!filtered.length) {
        list.innerHTML = `
          <div class="empty-state" style="padding:40px">
            <div class="empty-icon">🔍</div>
            <h3>No expenses found</h3>
            <p>Try adjusting your filters</p>
          </div>`;
        return;
      }

      // Group by date
      const byDate = {};
      filtered.forEach(e => {
        const dateKey = new Date(e.date || e.createdAt).toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        (byDate[dateKey] = byDate[dateKey] || []).push(e);
      });

      list.innerHTML = Object.entries(byDate).map(([date, exps]) => `
        <div class="activity-date-header">${date}</div>
        ${exps.map(e => {
          const payer = users[e.paidBy] || { name: e.paidBy.split('@')[0] };
          const myShare = e.splits?.[currentUser.email] || 0;
          return `
            <div class="expense-item" style="cursor:pointer" onclick="window.location.href='group-detail.html?id=${e.groupId}'">
              <div class="expense-icon">${UI.categoryIcon(e.category)}</div>
              <div class="expense-info">
                <div class="expense-name">${e.description}</div>
                <div class="expense-meta">
                  <span style="background:var(--bg3);padding:2px 8px;border-radius:99px;font-size:0.76rem">${e.group.name}</span>
                  &nbsp; Paid by ${payer.name}
                </div>
              </div>
              <div style="text-align:right">
                <div class="expense-amount">${UI.formatAmount(e.amount, e.group.currency)}</div>
                ${myShare ? `<div style="font-size:0.78rem;color:var(--text-muted)">you: ${UI.formatAmount(myShare, e.group.currency)}</div>` : ''}
              </div>
            </div>`;
        }).join('')}`
      ).join('');
    }
  </script>
</body>
</html>
