<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – SplitEase</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/landing.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .invite-card {
      background: linear-gradient(135deg, rgba(124,106,247,0.12), rgba(74,222,128,0.08));
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .invite-info { flex: 1; }
    .invite-group { font-weight: 600; font-size: 0.95rem; }
    .invite-from { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }
    .invite-actions { display: flex; gap: 8px; }
    .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .group-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .group-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
    .group-cat-icon { font-size: 1.8rem; margin-bottom: 12px; }
    .group-name { font-family: var(--font-display); font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .group-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 12px; margin-bottom: 14px; }
    .group-total { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; }
    .group-balance { font-size: 0.82rem; margin-top: 2px; }
    .recent-section { margin-top: 28px; }
  </style>
</head>
<body class="app-layout" style="display:flex">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <!-- Mobile header -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <button id="mobile-menu-btn" class="btn-ghost btn-icon" style="display:none">☰</button>
      <div>
        <div class="page-title" id="welcome-title">Good morning! 👋</div>
        <div class="page-subtitle" id="welcome-sub">Here's your financial overview</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:10px">
        <button class="btn-primary btn-sm" onclick="window.location.href='groups.html?new=1'">+ New Group</button>
      </div>
    </div>

    <!-- Pending Invitations -->
    <div id="invites-section" class="hidden">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <h2 style="font-family:var(--font-display);font-size:1.05rem">📨 Pending Invitations</h2>
      </div>
      <div id="invites-list"></div>
      <hr class="divider" />
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid"></div>

    <!-- Groups -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-family:var(--font-display);font-size:1.1rem">My Groups</h2>
      <button class="btn-ghost btn-sm" onclick="window.location.href='groups.html'">View All →</button>
    </div>
    <div class="groups-grid" id="groups-grid"></div>

    <!-- Recent Activity -->
    <div class="recent-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="font-family:var(--font-display);font-size:1.1rem">Recent Activity</h2>
        <button class="btn-ghost btn-sm" onclick="window.location.href='activity.html'">View All →</button>
      </div>
      <div class="card" id="recent-expenses">
        <div class="empty-state">
          <div class="empty-icon">💸</div>
          <h3>No expenses yet</h3>
          <p>Create a group and add your first expense to get started</p>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    let currentUser;

    document.addEventListener('DOMContentLoaded', () => {
      currentUser = Auth.requireAuth('../index.html');
      if (!currentUser) return;

      Sidebar.init('dashboard');
      renderGreeting();
      renderInvites();
      renderStats();
      renderGroups();
      renderRecentActivity();
    });

    function renderGreeting() {
      const h = new Date().getHours();
      const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
      document.getElementById('welcome-title').textContent = `${greet}, ${currentUser.name}! 👋`;
    }

    function renderInvites() {
      const pending = DB.getPendingInvitesForUser(currentUser.email);
      if (!pending.length) return;

      document.getElementById('invites-section').classList.remove('hidden');
      const list = document.getElementById('invites-list');
      list.innerHTML = pending.map(inv => {
        const group = DB.getGroup(inv.groupId);
        if (!group) return '';
        const inviter = UI.getUserDisplay(inv.invitedBy);
        return `
          <div class="invite-card">
            <div style="font-size:1.6rem">${getCatIcon(group.category)}</div>
            <div class="invite-info">
              <div class="invite-group">${group.name}</div>
              <div class="invite-from">Invited by ${inviter.name} · ${group.members.length} member${group.members.length !== 1 ? 's' : ''}</div>
            </div>
            <div class="invite-actions">
              <button class="btn-success btn-sm" onclick="acceptInvite('${inv.id}')">Accept</button>
              <button class="btn-ghost btn-sm" onclick="declineInvite('${inv.id}')">Decline</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function acceptInvite(inviteId) {
      DB.acceptInvite(inviteId, currentUser.email);
      UI.toast('Joined group successfully! 🎉', 'success');
      renderInvites();
      renderStats();
      renderGroups();
      Sidebar.init('dashboard');
    }

    function declineInvite(inviteId) {
      DB.declineInvite(inviteId, currentUser.email);
      UI.toast('Invitation declined.', 'info');
      renderInvites();
      Sidebar.init('dashboard');
    }

    function renderStats() {
      const groups = DB.getGroupsForUser(currentUser.email);
      let totalOwed = 0, totalOwe = 0, totalGroups = groups.length;

      groups.forEach(g => {
        const balances = DB.calcBalances(g.id);
        const myBal = balances[currentUser.email] || 0;
        if (myBal > 0) totalOwed += myBal;
        else totalOwe += Math.abs(myBal);
      });

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Groups</div>
          <div class="stat-value font-display">${totalGroups}</div>
          <div class="stat-sub">active groups</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">You are owed</div>
          <div class="stat-value font-display text-green">${UI.formatAmount(totalOwed)}</div>
          <div class="stat-sub">across all groups</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">You owe</div>
          <div class="stat-value font-display text-red">${UI.formatAmount(totalOwe)}</div>
          <div class="stat-sub">across all groups</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Net balance</div>
          <div class="stat-value font-display ${totalOwed - totalOwe >= 0 ? 'text-green' : 'text-red'}">
            ${UI.formatAmount(totalOwed - totalOwe)}
          </div>
          <div class="stat-sub">${totalOwed - totalOwe >= 0 ? 'in your favour' : 'you need to pay'}</div>
        </div>
      `;
    }

    function renderGroups() {
      const groups = DB.getGroupsForUser(currentUser.email);
      const grid = document.getElementById('groups-grid');

      if (!groups.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">👥</div>
            <h3>No groups yet</h3>
            <p>Create a group to start tracking shared expenses with friends</p>
            <button class="btn-primary" onclick="window.location.href='groups.html?new=1'">Create First Group</button>
          </div>`;
        return;
      }

      grid.innerHTML = groups.slice(0, 6).map(g => {
        const total = DB.calcGroupTotal(g.id);
        const balances = DB.calcBalances(g.id);
        const myBal = balances[currentUser.email] || 0;
        const balClass = myBal > 0 ? 'text-green' : myBal < 0 ? 'text-red' : 'text-muted';
        const balText = myBal > 0
          ? `you are owed ${UI.formatAmount(myBal)}`
          : myBal < 0
          ? `you owe ${UI.formatAmount(Math.abs(myBal))}`
          : 'settled up ✓';
        return `
          <div class="group-card" onclick="window.location.href='group-detail.html?id=${g.id}'">
            <div class="group-cat-icon">${getCatIcon(g.category)}</div>
            <div class="group-name">${g.name}</div>
            <div class="group-meta">
              <span>👥 ${g.members.length}</span>
              <span>${UI.formatDate(new Date(g.createdAt).toISOString())}</span>
            </div>
            <div class="group-total">${UI.formatAmount(total)}</div>
            <div class="group-balance ${balClass}">${balText}</div>
          </div>
        `;
      }).join('');
    }

    function renderRecentActivity() {
      const groups = DB.getGroupsForUser(currentUser.email);
      const allExpenses = [];
      groups.forEach(g => {
        DB.getExpensesForGroup(g.id).forEach(e => allExpenses.push({ ...e, groupName: g.name, groupId: g.id }));
      });
      allExpenses.sort((a, b) => b.createdAt - a.createdAt);
      const recent = allExpenses.slice(0, 8);

      const container = document.getElementById('recent-expenses');
      if (!recent.length) return; // keep empty state

      container.innerHTML = recent.map(e => {
        const payer = UI.getUserDisplay(e.paidBy);
        const myShare = e.splits?.[currentUser.email] || 0;
        return `
          <div class="expense-item" style="cursor:pointer" onclick="window.location.href='group-detail.html?id=${e.groupId}'">
            <div class="expense-icon">${UI.categoryIcon(e.category)}</div>
            <div class="expense-info">
              <div class="expense-name">${e.description}</div>
              <div class="expense-meta">${e.groupName} · Paid by ${payer.name} · ${UI.timeAgo(e.createdAt)}</div>
            </div>
            <div>
              <div class="expense-amount">${UI.formatAmount(e.amount)}</div>
              ${myShare ? `<div style="font-size:0.78rem;color:var(--text-muted);text-align:right">your share: ${UI.formatAmount(myShare)}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function getCatIcon(cat) {
      const icons = { trip:'✈️', home:'🏠', other:'📦', event:'🎉', couple:'❤️', work:'💼' };
      return icons[cat] || '📦';
    }
  </script>
</body>
</html>
