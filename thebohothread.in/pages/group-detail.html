  <!-- Lightweight JWT signing (HMAC-SHA256 via SubtleCrypto — built into all browsers, no library needed) -->
  <script>
    // ── JWT helpers ──────────────────────────────────────────────────────────
    // We use HS256 with a secret stored only in your Firebase project config.
    // The token payload carries: groupId, invitedEmail, invitedBy, exp (1 week).
    // On invite.html we verify the token before accepting.

    const JWT_SECRET = 'REPLACE_WITH_YOUR_OWN_SECRET_32CHARS'; // 🔑 change this!

    async function _jwtSign(payload) {
      const header  = { alg: 'HS256', typ: 'JWT' };
      // Unicode-safe encoder (fixes emoji/non-Latin1 crash)
      const encode  = obj => btoa(unescape(encodeURIComponent(JSON.stringify(obj)))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
      const msg     = encode(header) + '.' + encode(payload);
      const key     = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(JWT_SECRET),
        { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
      );
      const sig     = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(msg));
      const sigB64  = btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
      return msg + '.' + sigB64;
    }

    async function _jwtVerify(token) {
      try {
        const [h, p, s] = token.split('.');
        const msg  = h + '.' + p;
        const key  = await crypto.subtle.importKey(
          'raw', new TextEncoder().encode(JWT_SECRET),
          { name: 'HMAC', hash: 'SHA-256' }, false, ['verify']
        );
        const sigBytes = Uint8Array.from(atob(s.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0));
        const valid    = await crypto.subtle.verify('HMAC', key, sigBytes, new TextEncoder().encode(msg));
        if (!valid) return null;
        const payload  = JSON.parse(atob(p.replace(/-/g,'+').replace(/_/g,'/')));
        if (payload.exp < Date.now()) return null; // expired
        return payload;
      } catch { return null; }
    }
  </script>

  <script>
    // ── Helpers ───────────────────────────────────────────────────────────────
    const _fs = () => firebase.firestore();
    const _rid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);

    const CAT_ICONS = {
      food:'🍽️', transport:'🚗', accommodation:'🏨', shopping:'🛍️',
      entertainment:'🎬', healthcare:'💊', utilities:'⚡',
      trip:'✈️', home:'🏠', friends:'👫', couple:'❤️', work:'💼', other:'📦'
    };

    // ── State ─────────────────────────────────────────────────────────────────
    let currentUser, group, groupId;
    let groupMembers = [];
    let expenses = [], settlements = [];
    let editingExpenseId = null; // null = adding new, string = editing existing
    let expenseLogs    = []; // audit log entries from Firestore
    let groupLogs      = []; // group-level change logs from Firestore
    let settlementLogs = []; // settlement audit logs from Firestore
    let pendingInvites = [];   // invitations with status !== 'accepted'
    let splitType = 'equal';
    let selectedSplitMembers = new Set();
    let currentTab = 'expenses';

    // ── Modal helpers ─────────────────────────────────────────────────────────
    function openMod(id) {
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }
    function closeMod(id) {
      const el = document.getElementById(id);
      if (el) el.classList.remove('active');
    }
    document.querySelectorAll('.modal-overlay').forEach(o => {
      o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
    });

    // ── Format helpers ────────────────────────────────────────────────────────
    function fmt(amount) {
      const sym = group ? (group.currency || '₹') : '₹';
      return sym + Math.abs(+amount || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtDate(ts) {
      if (!ts) return '';
      const d = typeof ts === 'number' ? new Date(ts) : new Date(ts);
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function memberName(memberId) {
      // Handle invite:email keys (used by openSettleModal / openAddExpense)
      if (memberId && memberId.startsWith('invite:')) {
        const email = memberId.slice(7);
        // If this person has since accepted, show their real name instead of email
        const accepted = groupMembers.find(u => u.email === email && u.name);
        if (accepted && !pendingInvites.some(i => (i.invitedEmail || i.email) === email && i.status === 'pending')) {
          return accepted.name || email;
        }
        return email; // still pending — show email
      }
      // Check pending invites by token (legacy path)
      const inv = pendingInvites.find(i => i.token === memberId);
      if (inv) return inv.invitedEmail || inv.email; // show email, not name

      // Check if this member has an *active* pending invite by id or email
      // (they are in group.members but have not yet accepted the invitation)
      const memberEmail = memberId.includes('@') ? memberId : (groupMembers.find(u => (u.id || u.uid) === memberId) || {}).email;
      if (memberEmail) {
        const pendingByEmail = pendingInvites.find(i => (i.invitedEmail || i.email) === memberEmail && i.status === 'pending');
        if (pendingByEmail) return memberEmail; // show email until invitation accepted
      }

      const m = groupMembers.find(u => (u.id || u.email) === memberId || u.email === memberId);
      if (!m) return memberId.includes('@') ? memberId : memberId.slice(0, 8);

      // Only show email if this member has an *active* pending invite (not declined/accepted)
      const mEmail = m.email || '';
      const hasActivePending = pendingInvites.some(i => (i.invitedEmail || i.email) === mEmail && i.status === 'pending');
      if (hasActivePending) return mEmail; // show email for still-pending members
      return m.name || mEmail; // show name for accepted members (or declined-then-accepted)
    }

    function memberAvatar(memberId) {
      // Handle invite:email keys
      if (memberId && memberId.startsWith('invite:')) {
        return `<div class="mini-avatar" style="background:#e6a817;color:#fff;font-size:0.9rem">@</div>`;
      }
      // Pending invite — show @ icon with status color
      const inv = pendingInvites.find(i => i.token === memberId);
      if (inv) {
        const color = inv.status === 'rejected' ? '#888' : '#e6a817';
        const opacity = inv.status === 'rejected' ? '0.5' : '1';
        return `<div class="mini-avatar" style="background:${color};color:#fff;opacity:${opacity};font-size:0.9rem">@</div>`;
      }
      const m = groupMembers.find(u => (u.id || u.email) === memberId || u.email === memberId);
      const name = (m && (m.name || m.email)) ? (m.name || m.email.split('@')[0]) : memberId.slice(0,6);
      const initial = (name && name[0]) ? name[0].toUpperCase() : "?";
      const colors = ['#6c63ff','#22c55e','#f97316','#3b82f6','#a855f7','#ec4899','#14b8a6'];
      const color = colors[(memberId.charCodeAt(0) || 0) % colors.length];
      if (m && m.photoURL) {
        return `<div class="mini-avatar"><img src="${m.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.parentElement.style.background='${color}';this.parentElement.textContent='${initial}'" /></div>`;
      }
      return `<div class="mini-avatar" style="background:${color};color:#fff">${initial}</div>`;
    }

    async function loadAll() {
      try {
        // 1. Load group document
        const gdoc = await _fs().collection('groups').doc(groupId).get();
        if (!gdoc.exists) {
          document.getElementById('group-header').innerHTML = '<div style="color:#ef4444;padding:20px">Group not found.</div>';
          return;
        }
        group = gdoc.data();

        // 2. Check membership (id or email may be used as member key)
        const myId    = currentUser.id;
        const myEmail = currentUser.email;
        const isMember = (myId && group.members.includes(myId)) || (myEmail && group.members.includes(myEmail));
        if (!isMember) {
          document.getElementById('group-header').innerHTML = '<div style="color:#ef4444;padding:20px">Access denied — you are not a member of this group.</div>';
          return;
        }

        // 3. Load member profiles
        groupMembers = [];

        // Helper: get all users ever stored in localStorage (legacy local DB)
        function _localUsers() {
          try {
            const db = JSON.parse(localStorage.getItem('splitmate_db') || '{}');
            return Object.values(db.users || {});
          } catch(e) { return []; }
        }

        for (const mid of group.members) {
          let found = null;

          // Try 1: fetch by Firestore doc ID
          try {
            const udoc = await _fs().collection('users').doc(mid).get();
            if (udoc.exists) { found = udoc.data(); }
          } catch(e) {}

          // Try 2: query Firestore by email field (if mid looks like an email)
          if (!found && mid.includes('@')) {
            try {
              const snap = await _fs().collection('users').where('email','==',mid).limit(1).get();
              if (!snap.empty) { found = snap.docs[0].data(); }
            } catch(e) {}
          }

          // Try 3: query Firestore by id field
          if (!found) {
            try {
              const snap = await _fs().collection('users').where('id','==',mid).limit(1).get();
              if (!snap.empty) { found = snap.docs[0].data(); }
            } catch(e) {}
          }

          // Try 4: check localStorage (legacy user registered before Firestore was wired up)
          if (!found) {
            try {
              const localDb = JSON.parse(localStorage.getItem('splitmate_db') || '{}');
              const localUsers = Object.values(localDb.users || {});
              const lu = localUsers.find(u => u.id === mid || u.email === mid);
              if (lu && lu.name && lu.email) {
                found = lu;
                // Back-fill into Firestore so future lookups work
                try {
                  const saveData = { id: lu.id, email: lu.email, name: lu.name,
                    avatarColor: lu.avatarColor || '#6c63ff', createdAt: lu.createdAt || Date.now(), groups: lu.groups || [] };
                  await _fs().collection('users').doc(lu.id).set(saveData, { merge: true });
                } catch(e2) {}
              }
            } catch(e) {}
          }

          // Try 5: check current session (the logged-in user viewing this page)
          if (!found) {
            try {
              const sess = Auth.currentUser ? Auth.currentUser() : null;
              if (sess && (sess.id === mid || sess.email === mid) && sess.name) {
                found = sess;
                // Back-fill into Firestore
                try {
                  const saveData = { id: sess.id, email: sess.email, name: sess.name,
                    avatarColor: sess.avatarColor || '#6c63ff', createdAt: sess.createdAt || Date.now(), groups: sess.groups || [] };
                  await _fs().collection('users').doc(sess.id).set(saveData, { merge: true });
                } catch(e2) {}
              }
            } catch(e) {}
          }

          groupMembers.push(found || { id: mid, email: mid.includes('@') ? mid : '', name: '' });
        }
        // 4. Load expenses
        const eSnap = await _fs().collection('expenses').where('groupId','==',groupId).get();
        expenses = eSnap.docs.map(d => d.data()).sort((a,b) => (b.date||b.createdAt||0) - (a.date||a.createdAt||0));

        // 5. Load settlements
        const sSnap = await _fs().collection('settlements').where('groupId','==',groupId).get();
        settlements = sSnap.docs.map(d => d.data()).sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

        // 5b. Load expense audit logs
        try {
          const logSnap = await _fs().collection('expense_logs').where('groupId','==',groupId).get();
          expenseLogs = logSnap.docs.map(d => d.data()).sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
        } catch(e) { expenseLogs = []; }

        // 5c. Load group-level change logs
        try {
          const gLogSnap = await _fs().collection('group_logs').where('groupId','==',groupId).get();
          groupLogs = gLogSnap.docs.map(d => d.data()).sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
        } catch(e) { groupLogs = []; }

        // 5d. Load settlement logs
        try {
          const sLogSnap = await _fs().collection('settlement_logs').where('groupId','==',groupId).get();
          settlementLogs = sLogSnap.docs.map(d => d.data()).sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
        } catch(e) { settlementLogs = []; }

        // 6. Load pending / rejected invitations (email-only virtual members)
        try {
          const invSnap = await _fs().collection('invitations')
            .where('groupId', '==', groupId)
            .get();
          const allInvites = invSnap.docs.map(d => d.data()).filter(i => i.status !== 'accepted');
          // FIX: Deduplicate by email — same person may have been invited multiple times
          // (each invite creates a new Firestore doc with a new token), causing duplicate rows
          const seenEmails = new Set();
          pendingInvites = allInvites.filter(inv => {
            const email = inv.invitedEmail || inv.email;
            if (seenEmails.has(email)) return false;
            seenEmails.add(email);
            return true;
          });
        } catch(e) {
          pendingInvites = [];
        }

        document.title = group.name + ' – SplitMate';
        renderHeader();
        renderExpenses();
        document.getElementById('e-date').value = new Date().toISOString().split('T')[0];

      } catch(err) {
        document.getElementById('group-header').innerHTML = '<div style="color:#ef4444;padding:20px">Error loading: ' + err.message + '</div>';
        console.error(err);
      }
    }

    // ── Balance calculation ───────────────────────────────────────────────────
    // Build alias map: old email/invite:email keys -> canonical member key in group.members
    // This handles Firestore expenses that still store old email keys after a user accepts invite
    function buildKeyAliasMap() {
      const map = {};
      group.members.forEach(mid => {
        const m = groupMembers.find(u => (u.id || u.email) === mid || u.email === mid);
        if (m) {
          const email = m.email || '';
          if (email && email !== mid) {
            map[email] = mid;
            map['invite:' + email] = mid;
          }
          if (m.id && m.id !== mid) map[m.id] = mid;
        }
        if (mid.includes('@')) map['invite:' + mid] = mid;
      });
      return map;
    }

    function calcBalances() {
      const bals = {};
      group.members.forEach(m => bals[m] = 0);

      // Also initialise slots for pending invitees using their invite:email key
      pendingInvites.forEach(inv => {
        const key = 'invite:' + (inv.invitedEmail || inv.email);
        if (!(key in bals)) bals[key] = 0;
      });

      // Alias map resolves old email/invite:email keys to current canonical keys
      const alias = buildKeyAliasMap();
      function resolve(key) {
        if (bals[key] !== undefined) return key;
        const a = alias[key];
        if (a !== undefined && bals[a] !== undefined) return a;
        if (key && key.startsWith('invite:')) {
          const email = key.slice(7);
          if (bals[email] !== undefined) return email;
          const b = alias[email];
          if (b !== undefined && bals[b] !== undefined) return b;
        }
        return null;
      }

      expenses.filter(e => !e.isSettlement).forEach(e => {
        const payerKey = resolve(e.paidBy);
        if (payerKey !== null) bals[payerKey] += (+e.amount || 0);

        if (Array.isArray(e.splits)) {
          e.splits.forEach(s => {
            const k = resolve(s.userId);
            if (k !== null) bals[k] -= (+s.amount || 0);
          });
        } else if (e.splits && typeof e.splits === 'object') {
          Object.entries(e.splits).forEach(([uid, amt]) => {
            const k = resolve(uid);
            if (k !== null) bals[k] -= (+amt || 0);
          });
        }
      });

      // Apply settlements (also resolve old keys)
      settlements.forEach(s => {
        const fromKey = resolve(s.paidBy);
        const toKey   = resolve(s.paidTo);
        if (fromKey !== null) bals[fromKey] += (+s.amount || 0);
        if (toKey   !== null) bals[toKey]   -= (+s.amount || 0);
      });

      return bals;
    }

    function calcSettlementTxns() {
      const bals = calcBalances();
      const debtors   = Object.entries(bals).filter(([,v]) => v < -0.005).sort((a,b) => a[1]-b[1]).map(([k,v]) => [k, Math.abs(v)]);
      const creditors = Object.entries(bals).filter(([,v]) => v >  0.005).sort((a,b) => b[1]-a[1]).map(x => [...x]);
      const txns = []; let i = 0, j = 0;

      while (i < debtors.length && j < creditors.length) {
        const pay = Math.min(debtors[i][1], creditors[j][1]);
        if (pay > 0.005) txns.push({ from: debtors[i][0], to: creditors[j][0], amount: +pay.toFixed(2) });
        debtors[i][1] -= pay; creditors[j][1] -= pay;
        if (debtors[i][1] < 0.005) i++;
        if (creditors[j][1] < 0.005) j++;
      }
      return txns;
    }

    // ── Balances Tab ──────────────────────────────────────────────────────────
    function renderBalances() {
      const bals = calcBalances();
      const el = document.getElementById('tab-balances');
      const maxAbs = Math.max(...Object.values(bals).map(Math.abs), 1);

      function makeRow(mid, bal) {
        const isInvited = mid.startsWith('invite:');
        const email = isInvited ? mid.slice(7) : (groupMembers.find(u => (u.id||u.email)===mid||u.email===mid)?.email || '');
        const displayName = memberName(mid);
        const pct = (Math.abs(bal) / maxAbs) * 100;
        const cls = bal > 0.005 ? 'text-green' : bal < -0.005 ? 'text-red' : '';
        const fill = bal > 0 ? '#22c55e' : '#ef4444';
        const lbl = bal > 0.005 ? `gets back ${fmt(bal)}` : bal < -0.005 ? `owes ${fmt(Math.abs(bal))}` : 'settled up';
        const invitedBadge = isInvited
          ? `<span style="font-size:0.7rem;background:rgba(230,168,23,0.15);color:#e6a817;border:1px solid rgba(230,168,23,0.35);border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle">Invite Pending</span>`
          : '';
        const emailLine = email
          ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:1px">${email}</div>`
          : '';
        return `<div class="member-balance-row">
          ${memberAvatar(mid)}
          <div class="member-bal-bar-wrap">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div>
                <span style="font-size:0.9rem;font-weight:500">${displayName}</span>${invitedBadge}
                ${emailLine}
              </div>
              <span class="${cls}" style="font-size:0.88rem;font-weight:600;white-space:nowrap;margin-left:12px">${lbl}</span>
            </div>
            <div class="member-bal-bar" style="margin-top:8px"><div class="member-bal-fill" style="width:${pct}%;background:${fill}"></div></div>
          </div>
        </div>`;
      }

      // Accepted members rows
      const acceptedRows = group.members.map(mid => makeRow(mid, bals[mid] || 0)).join('');

      // Pending invitee rows — only those who have a non-zero balance
      const inviteKeys = pendingInvites.map(i => `invite:${i.invitedEmail || i.email}`);
      const inviteRows = inviteKeys
        .filter(key => Math.abs(bals[key] || 0) > 0.005)
        .map(key => makeRow(key, bals[key] || 0)).join('');

      const inviteSection = inviteRows
        ? `<div style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)">

    // ── Members Tab ───────────────────────────────────────────────────────────
    function renderMembers() {

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">

          ${pendingInvites.filter(inv => inv.status === 'pending').map(inv => {

    // ── Add Expense ───────────────────────────────────────────────────────────
    function openAddExpense() {
      editingExpenseId = null;
      document.getElementById('expense-modal-title').textContent = 'Add Expense';
      document.getElementById('expense-save-btn').textContent = 'Add Expense';
      splitType = 'equal';
      // FIX: Use stable email-based key for pending invites (not token, which differs per invite doc)
      // Only include invites that are still pending — skip declined/rejected ones
      const activePendingInvites = pendingInvites.filter(i => i.status === 'pending');
      const inviteKeys = activePendingInvites.map(i => `invite:${i.invitedEmail || i.email}`);
      const allMemberKeys = [...group.members, ...inviteKeys];
      selectedSplitMembers = new Set(allMemberKeys);
      document.querySelectorAll('.split-tab').forEach(t => t.classList.toggle('active', t.dataset.type === 'equal'));

      const myId = currentUser.id, myEmail = currentUser.email;
      const myKey = group.members.find(m => m === myId || m === myEmail) || myId || myEmail;

      // Build payer dropdown: accepted members with name, invites with email + badge
      document.getElementById('e-paidby').innerHTML = allMemberKeys.map(m => {
        const inv = pendingInvites.find(i => `invite:${i.invitedEmail || i.email}` === m);
        let label;
        if (inv) {
          label = `${inv.invitedEmail || inv.email} (${inv.status === 'rejected' ? 'declined' : 'invited'})`;
        } else {
          label = memberName(m) + (m === myKey ? ' (You)' : '');
        }
        return `<option value="${m}" ${m === myKey ? 'selected' : ''}>${label}</option>`;
      }).join('');

      renderSplitMembers();
      openMod('add-expense-modal');
      setTimeout(() => document.getElementById('e-desc').focus(), 50);
    }

    function openEditExpense(expId) {
      const e = expenses.find(x => x.id === expId);
      if (!e) return;

      editingExpenseId = expId;
      document.getElementById('expense-modal-title').textContent = 'Edit Expense';
      document.getElementById('expense-save-btn').textContent = 'Save Changes';

      // Populate basic fields
      document.getElementById('e-desc').value   = e.description || '';
      document.getElementById('e-amount').value = e.amount || '';
      document.getElementById('e-cat').value    = e.category || 'other';
      document.getElementById('e-notes').value  = e.notes || '';

      // Date
      if (e.date) {
        const d = new Date(typeof e.date === 'number' ? e.date : new Date(e.date).getTime());
        document.getElementById('e-date').value = d.toISOString().split('T')[0];
      }

      // Build member keys (same as openAddExpense)
      const inviteKeys = pendingInvites.map(i => `invite:${i.invitedEmail || i.email}`);
      const allMemberKeys = [...group.members, ...inviteKeys];

      // Paid by dropdown
      const myId = currentUser.id, myEmail = currentUser.email;
      const myKey = group.members.find(m => m === myId || m === myEmail) || myId || myEmail;
      document.getElementById('e-paidby').innerHTML = allMemberKeys.map(m => {
        const inv = pendingInvites.find(i => `invite:${i.invitedEmail || i.email}` === m);
        let label = inv
          ? `${inv.invitedEmail || inv.email} (${inv.status === 'rejected' ? 'declined' : 'invited'})`
          : memberName(m) + (m === myKey ? ' (You)' : '');
        const selected = m === e.paidBy || (alias => alias && alias[e.paidBy] === m)(buildKeyAliasMap());
        return `<option value="${m}" ${selected ? 'selected' : ''}>${label}</option>`;
      }).join('');

      // Split type
      splitType = e.splitType || 'equal';
      document.querySelectorAll('.split-tab').forEach(t => t.classList.toggle('active', t.dataset.type === splitType));

      // Pre-select split members from existing splits
      const alias = buildKeyAliasMap();
      function resolveToMemberKey(uid) {
        if (allMemberKeys.includes(uid)) return uid;
        if (alias[uid] && allMemberKeys.includes(alias[uid])) return alias[uid];
        if (uid && uid.startsWith('invite:')) {
          const email = uid.slice(7);
          const k = 'invite:' + email;
          if (allMemberKeys.includes(k)) return k;
        }
        return null;
      }

      if (Array.isArray(e.splits) && e.splits.length) {
        selectedSplitMembers = new Set(
          e.splits.map(s => resolveToMemberKey(s.userId)).filter(Boolean)
        );
      } else {
        selectedSplitMembers = new Set(allMemberKeys);
      }

      renderSplitMembers();

      // After render, fill in custom / percentage values
      if (splitType !== 'equal' && Array.isArray(e.splits)) {
        setTimeout(() => {
          e.splits.forEach(s => {
            const key = resolveToMemberKey(s.userId);
            if (!key) return;
            const inp = document.querySelector(`.split-member-input[data-mid="${key}"]`);
            if (inp) inp.value = splitType === 'percentage'
              ? +(s.amount / e.amount * 100).toFixed(2)
              : s.amount;
          });
          updateSplitDisplay();
        }, 50);
      }

      openMod('add-expense-modal');
      setTimeout(() => document.getElementById('e-desc').focus(), 50);
    }

    function setSplitType(type) {
      splitType = type;
      document.querySelectorAll('.split-tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
      renderSplitMembers();
    }

    function renderSplitMembers() {
      const amount = parseFloat(document.getElementById('e-amount')?.value) || 0;
      const count  = selectedSplitMembers.size || 1;
      const eq     = amount / count;
      const el     = document.getElementById('split-members-list');
      if (!el) return;

      // FIX: Use stable email-based keys for invites, matching openAddExpense
      // Only show truly pending invites — skip declined/rejected ones
      const inviteKeys = pendingInvites.filter(i => i.status === 'pending').map(i => `invite:${i.invitedEmail || i.email}`);
      const allMemberKeys = [...group.members, ...inviteKeys];

      el.innerHTML = allMemberKeys.map(mid => {
        // FIX: Look up invite by email-based key instead of token
        const inv = pendingInvites.find(i => `invite:${i.invitedEmail || i.email}` === mid);
        const email = inv ? (inv.invitedEmail || inv.email) : null;
        const statusBadge = inv
          ? (inv.status === 'rejected'
              ? `<span style="font-size:0.7rem;background:rgba(255,80,80,0.15);color:#e05252;border-radius:4px;padding:1px 5px;font-weight:700;margin-left:4px">Declined</span>`
              : `<span style="font-size:0.7rem;background:rgba(255,165,0,0.18);color:#e6a817;border-radius:4px;padding:1px 5px;font-weight:700;margin-left:4px">Invited</span>`)
          : '';
        const displayName = email
          ? `<span style="color:${inv.status==='rejected'?'var(--text-muted)':'var(--text)'}">${email}</span>${statusBadge}`
          : memberName(mid);

        // FIX: For invite keys, render avatar inline (can't use memberAvatar which looks up by token)
        const avatarHtml = inv
          ? `<div class="mini-avatar" style="background:${inv.status==='rejected'?'#888':'#e6a817'};color:#fff;opacity:${inv.status==='rejected'?'0.5':'1'};font-size:0.9rem">@</div>`
          : memberAvatar(mid);

        const chk  = selectedSplitMembers.has(mid);
        let inp = '';
        if (splitType === 'equal') {
          inp = `<span style="color:var(--text-muted);font-size:0.85rem">${chk ? fmt(eq) : '—'}</span>`;
        } else if (splitType === 'percentage') {
          inp = `<input type="number" class="form-input split-member-input" data-mid="${mid}" placeholder="%" min="0" max="100" value="${chk ? Math.round(100/count) : 0}" oninput="updateSplitDisplay()" />`;
        } else {
          inp = `<input type="number" class="form-input split-member-input" data-mid="${mid}" placeholder="0" min="0" step="0.01" value="${chk ? eq.toFixed(2) : 0}" oninput="updateSplitDisplay()" />`;
        }
        return `<div class="split-member-row">
          <input type="checkbox" ${chk ? 'checked' : ''} onchange="toggleSplitMember('${mid}',this.checked)" style="accent-color:var(--accent)">
          ${avatarHtml}
          <span class="split-member-name">${displayName}</span>
          ${inp}
        </div>`;
      }).join('');
      // NOTE: do NOT call updateSplitDisplay() here — it would create infinite recursion
      // for 'equal' split type (updateSplitDisplay -> renderSplitMembers -> updateSplitDisplay ...)
      if (splitType !== 'equal') {
        updateSplitDisplay();
      } else {
        // For equal, show confirmation total
        const amount2 = parseFloat(document.getElementById('e-amount')?.value) || 0;
        const disp2 = document.getElementById('split-total-display');
        if (disp2 && amount2 > 0) {
          disp2.innerHTML = '<span style="color:var(--green,#22c55e)">Total: ' + fmt(amount2) + ' ✓ (split equally)</span>';
        } else if (disp2) { disp2.textContent = ''; }
      }
    }

    function toggleSplitMember(mid, chk) {
      if (chk) selectedSplitMembers.add(mid); else selectedSplitMembers.delete(mid);
      renderSplitMembers();
    }

    function updateSplitDisplay() {
      if (splitType === 'equal') { return; }
      const amount = parseFloat(document.getElementById('e-amount')?.value) || 0;
      let total = 0;
      document.querySelectorAll('.split-member-input').forEach(i => total += parseFloat(i.value) || 0);
      const disp = document.getElementById('split-total-display');
      if (!disp) return;

      if (splitType === 'percentage') {
        const over = total > 100.005;
        const exact = Math.abs(total - 100) < 0.01;
        disp.innerHTML = '<span style="color:' + (over ? '#ef4444' : exact ? 'var(--green,#22c55e)' : 'var(--text-muted)') + '">'
          + 'Total: ' + total.toFixed(1) + '% (should be 100%)' + (over ? ' ⚠️ Exceeds 100%' : exact ? ' ✓' : '')
          + '</span>';
      } else {
        const over  = total > amount + 0.005;
        const exact = Math.abs(total - amount) < 0.01;
        disp.innerHTML = '<span style="color:' + (over ? '#ef4444' : exact ? 'var(--green,#22c55e)' : 'var(--text-muted)') + '">'
          + 'Split total: ' + fmt(total) + ' of ' + fmt(amount) + (over ? ' ⚠️ Exceeds expense amount' : exact ? ' ✓' : '')
          + '</span>';
      }
    }

    function buildSplitsArray() {
      const amount = parseFloat(document.getElementById('e-amount').value) || 0;
      const splits = [];
      if (splitType === 'equal') {
        const count = selectedSplitMembers.size;
        selectedSplitMembers.forEach(mid => splits.push({ userId: mid, amount: +(amount / count).toFixed(2) }));
      } else {
        document.querySelectorAll('.split-member-input').forEach(inp => {
          const mid = inp.dataset.mid;
          if (!selectedSplitMembers.has(mid)) return;
          let val = parseFloat(inp.value) || 0;
          if (splitType === 'percentage') val = +(amount * val / 100).toFixed(2);
          splits.push({ userId: mid, amount: +val.toFixed(2) });
        });
      }
      return splits;
    }

    async function saveExpense() {
      const desc   = document.getElementById('e-desc').value.trim();
      const amount = parseFloat(document.getElementById('e-amount').value);
      const paidBy = document.getElementById('e-paidby').value;
      const cat    = document.getElementById('e-cat').value;
      const date   = document.getElementById('e-date').value;
      const notes  = document.getElementById('e-notes').value.trim();

      if (!desc)               { toast_('Description is required.', 'error'); return; }
      if (!amount || amount<=0){ toast_('Enter a valid amount.', 'error'); return; }
      if (!selectedSplitMembers.size){ toast_('Select at least one member.', 'error'); return; }

      // Validate split totals for non-equal splits
      if (splitType === 'percentage') {
        let totalPct = 0;
        document.querySelectorAll('.split-member-input').forEach(i => totalPct += parseFloat(i.value) || 0);
        if (Math.abs(totalPct - 100) > 0.5) {
          toast_('Percentages must add up to 100%. Currently: ' + totalPct.toFixed(1) + '%', 'error');
          return;
        }
      } else if (splitType === 'custom') {
        let splitTotal = 0;
        document.querySelectorAll('.split-member-input').forEach(i => splitTotal += parseFloat(i.value) || 0);
        if (splitTotal > amount + 0.01) {
          toast_('Split total (' + fmt(splitTotal) + ') exceeds expense amount (' + fmt(amount) + ')', 'error');
          return;
        }
        if (splitTotal < amount - 0.01) {
          toast_('Split total (' + fmt(splitTotal) + ') is less than expense amount (' + fmt(amount) + ')', 'error');
          return;
        }
      }

      const myId = currentUser.id, myEmail = currentUser.email;
      const splits = buildSplitsArray();

      if (editingExpenseId) {
        // ── UPDATE existing expense ──────────────────────────────────────────
        const oldExp = expenses.find(e => e.id === editingExpenseId) || {};
        const updates = {
          description: desc, amount, paidBy, category: cat,
          splitType, splits,
          date: date ? new Date(date).getTime() : Date.now(),
          notes, updatedBy: myId || myEmail, updatedAt: Date.now()
        };
        // Build diff for audit log
        const changes = [];
        const fieldLabel = { description:'Description', amount:'Amount', paidBy:'Paid By', category:'Category', splitType:'Split Type', notes:'Notes', date:'Date' };
        for (const [field, label] of Object.entries(fieldLabel)) {
          const before = oldExp[field], after = updates[field];
          if (field === 'amount') {
            if (Math.abs((+before||0) - (+after||0)) > 0.005)
              changes.push({ field: label, before: fmt(before||0), after: fmt(after||0) });
          } else if (field === 'paidBy') {
            if (before !== after)
              changes.push({ field: label, before: memberName(before||''), after: memberName(after||'') });
          } else if (field === 'date') {
            const bd = before ? fmtDate(before) : '—', ad = after ? fmtDate(after) : '—';
            if (bd !== ad) changes.push({ field: label, before: bd, after: ad });
          } else {
            if ((before||'') !== (after||''))
              changes.push({ field: label, before: before||'—', after: after||'—' });
          }
        }
        // Check split changes
        const oldSplitStr = JSON.stringify((oldExp.splits||[]).map(s=>({u:s.userId,a:s.amount})));
        const newSplitStr = JSON.stringify((splits||[]).map(s=>({u:s.userId,a:s.amount})));
        if (oldSplitStr !== newSplitStr) {
          changes.push({
            field: 'Splits',
            before: (oldExp.splits||[]).map(s => memberName(s.userId)+': '+fmt(s.amount)).join(', ') || '—',
            after:  (splits||[]).map(s => memberName(s.userId)+': '+fmt(s.amount)).join(', ') || '—'
          });
        }
        try {
          await writeExpenseLog('edited', oldExp, changes);
          await _fs().collection('expenses').doc(editingExpenseId).update(updates);
          const idx = expenses.findIndex(e => e.id === editingExpenseId);
          if (idx !== -1) expenses[idx] = { ...expenses[idx], ...updates };
          editingExpenseId = null;
          closeMod('add-expense-modal');
          toast_('Expense updated! ✏️', 'success');
          renderHeader();
          renderTab(currentTab);
        } catch(err) { toast_('Update failed: ' + err.message, 'error'); }
      } else {
        // ── CREATE new expense ───────────────────────────────────────────────
        const id = _rid();
        const exp = {
          id, groupId, description: desc, amount, paidBy, category: cat,
          splitType, splits,
          date: date ? new Date(date).getTime() : Date.now(),
          notes, createdBy: myId || myEmail, createdAt: Date.now(), isSettlement: false
        };
        try {
          await _fs().collection('expenses').doc(id).set(exp);
          await writeExpenseLog('created', exp, null);
          expenses.unshift(exp);
          closeMod('add-expense-modal');
          document.getElementById('e-desc').value = '';
          document.getElementById('e-amount').value = '';
          toast_('Expense added! 💸', 'success');
          renderHeader();
          renderTab(currentTab);
        } catch(err) { toast_('Save failed: ' + err.message, 'error'); }
      }
    }

    // ── Expense Audit Log ────────────────────────────────────────────────────
    async function writeExpenseLog(action, expenseSnapshot, changes) {
      const myId = currentUser.id, myEmail = currentUser.email;
      const logId = _rid();
      const log = {
        id: logId,
        groupId,
        action,                          // 'created' | 'edited' | 'deleted'
        expenseId:   expenseSnapshot.id,
        expenseName: expenseSnapshot.description || '',
        actorId:     myId || myEmail,
        actorName:   currentUser.name || myEmail,
        timestamp:   Date.now(),
        snapshot:    expenseSnapshot,    // full copy of expense at time of action
        changes:     changes || null     // array of {field, before, after} for edits
      };
      try {
        await _fs().collection('expense_logs').doc(logId).set(log);
        expenseLogs.unshift(log);
      } catch(e) { console.warn('Log write failed:', e); }
    }

    // ── Render History Tab ────────────────────────────────────────────────────
    function renderHistory() {
      const el = document.getElementById('tab-history');

      // Merge expense logs + group logs + settlement logs, sorted newest first
      const allLogs = [
        ...expenseLogs.map(l => ({ ...l, logType: l.logType || 'expense' })),
        ...groupLogs.map(l =>   ({ ...l, logType: 'group' })),
        ...settlementLogs.map(l => ({ ...l, logType: 'settlement' }))
      ].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

      if (!allLogs.length) {
        el.innerHTML = `<div class="card empty-state">
          <div class="empty-icon">📋</div>
          <h3>No history yet</h3>
          <p>Changes to expenses and group settings will appear here.</p>
        </div>`;
        return;
      }

      // ── icons / colours per action ─────────────────────────────────────────
      const actionIcon  = { created: '➕', edited: '✏️', deleted: '🗑️', group_edited: '⚙️', settlement_added: '💸', settlement_edited: '✏️', settlement_deleted: '🗑️' };
      const actionColor = { created: '#22c55e', edited: '#6c63ff', deleted: '#ef4444', group_edited: '#f59e0b', settlement_added: '#22c55e', settlement_edited: '#6c63ff', settlement_deleted: '#ef4444' };
      const actionLabel = { created: 'Added', edited: 'Edited', deleted: 'Deleted', group_edited: 'Group Updated', settlement_added: 'Payment Added', settlement_edited: 'Payment Edited', settlement_deleted: 'Payment Deleted' };

      const rows = allLogs.map(log => {
        const icon  = actionIcon[log.action]  || '📝';
        const color = actionColor[log.action] || '#888';
        const label = actionLabel[log.action] || log.action;
        const ts    = fmtDate(log.timestamp) + ' ' + new Date(log.timestamp).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });

        // Changes diff rows (used by both expense edits and group edits)
        let changesHtml = '';
        if (log.changes && log.changes.length) {
          changesHtml = `<div class="log-changes">
            ${log.changes.map(c => `<div class="log-change-row">
              <span class="log-field">${c.field}</span>
              <span class="log-before">${c.before}</span>
              <span style="color:var(--text-muted)">→</span>
              <span class="log-after">${c.after}</span>
            </div>`).join('')}
          </div>`;
        }

        // Expense snapshot (only for expense logs)
        const snapshotHtml = log.snapshot ? `
          <div class="log-snapshot">
            <div class="log-snapshot-title">Expense Snapshot</div>
            <div class="log-snapshot-row"><span>Description</span><span>${log.snapshot.description || '—'}</span></div>
            <div class="log-snapshot-row"><span>Amount</span><span>${fmt(log.snapshot.amount || 0)}</span></div>
            <div class="log-snapshot-row"><span>Paid By</span><span>${memberName(log.snapshot.paidBy || '')}</span></div>
            <div class="log-snapshot-row"><span>Category</span><span>${log.snapshot.category || '—'}</span></div>
            <div class="log-snapshot-row"><span>Split</span><span>${log.snapshot.splitType || 'equal'}</span></div>
            ${log.snapshot.notes ? `<div class="log-snapshot-row"><span>Notes</span><span>${log.snapshot.notes}</span></div>` : ''}
            ${Array.isArray(log.snapshot.splits) ? `<div class="log-snapshot-row"><span>Splits</span><span>${log.snapshot.splits.map(s => memberName(s.userId) + ': ' + fmt(s.amount)).join(', ')}</span></div>` : ''}
          </div>` : '';

        // Subject label differs: expense name vs "Group Settings" vs settlement
        const subjectHtml = log.logType === 'group'
          ? `<span class="log-expense-name" style="color:var(--text-muted);font-style:italic">Group Settings</span>`
          : log.logType === 'settlement'
            ? `<span class="log-expense-name" style="color:var(--text-muted);font-style:italic">${log.settlement ? `${memberName(log.settlement.paidBy)} → ${memberName(log.settlement.paidTo)} ${fmt(log.settlement.amount)}` : 'Payment'}</span>`
            : `<span class="log-expense-name">"${log.expenseName || ''}"</span>`;

        // Only show expand chevron if there is detail to show
        const hasDetail = changesHtml || snapshotHtml;
        const chevron   = hasDetail ? `<div class="log-chevron" id="chev-${log.id}">▼</div>` : '';
        const clickAttr = hasDetail ? `onclick="toggleLogDetail('${log.id}')"` : '';

        return `<div class="log-entry" ${clickAttr}>
          <div class="log-entry-header">
            <div class="log-action-badge" style="background:${color}20;color:${color};border:1px solid ${color}40">
              ${icon} ${label}
            </div>
            <div class="log-entry-meta">
              ${subjectHtml}
              <span class="log-actor">by ${log.actorName || log.actorId}</span>
            </div>
            <div class="log-timestamp">${ts}</div>
            ${chevron}
          </div>
          ${hasDetail ? `<div class="log-detail hidden" id="detail-${log.id}">${changesHtml}${snapshotHtml}</div>` : ''}
        </div>`;
      }).join('');

      el.innerHTML = `
        <div class="card" style="padding:0;overflow:hidden">
          <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
            <div style="font-family:var(--font-display);font-weight:700">Activity History</div>
            <span style="font-size:0.78rem;color:var(--text-muted)">${allLogs.length} event${allLogs.length !== 1 ? 's' : ''}</span>
          </div>
          <div style="padding:8px 0">${rows}</div>
        </div>`;
    }

    function toggleLogDetail(logId) {
      const detail = document.getElementById('detail-' + logId);
      const chev   = document.getElementById('chev-'   + logId);
      if (!detail) return;
      const isOpen = !detail.classList.contains('hidden');
      detail.classList.toggle('hidden', isOpen);
      if (chev) chev.textContent = isOpen ? '▼' : '▲';
    }

    async function deleteExpense(expId) {
      if (!confirm('Delete this expense? This cannot be undone.')) return;
      const snap = expenses.find(e => e.id === expId);
      try {
        if (snap) await writeExpenseLog('deleted', snap, null);
        await _fs().collection('expenses').doc(expId).delete();
        expenses = expenses.filter(e => e.id !== expId);
        toast_('Expense deleted.', 'info');
        renderHeader();
        renderTab(currentTab);
      } catch(err) { toast_('Delete failed: ' + err.message, 'error'); }
    }

    // ── Invite ────────────────────────────────────────────────────────────────
    async function sendInvite() {
      const email = document.getElementById('invite-email').value.trim().toLowerCase();
      if (!email || !email.includes('@')) { toast_('Enter a valid email.', 'error'); return; }
      if (group.members.includes(email)) { toast_('Already a member.', 'error'); return; }

      const btn = document.querySelector('#invite-modal .btn-primary');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      try {
        // ── 1. Build JWT token (expires in 7 days) ──────────────────────────
        const payload = {
          groupId,
          invitedEmail : email,
          invitedBy    : currentUser.id || currentUser.email,
          inviterName  : currentUser.name || currentUser.email,
          exp          : Date.now() + 7 * 24 * 60 * 60 * 1000
        };
        const jwtToken  = await _jwtSign(payload);
        const inviteUrl = `${location.origin}/invite.html?token=${encodeURIComponent(jwtToken)}`;

        // ── 2. Store pending invitation in Firestore ─────────────────────────
        await _fs().collection('invitations').doc(jwtToken.slice(-20)).set({
          jwtToken, groupId,
          invitedEmail : email,
          invitedBy    : currentUser.id || currentUser.email,
          status       : 'pending',
          createdAt    : Date.now()
        });

        // ── 3. Send email via EmailJS (free, no backend) ─────────────────────
        // 🔧 Replace these 3 values from https://dashboard.emailjs.com
        const EMAILJS_SERVICE_ID  = 'service_5fhtkaj';   
        const EMAILJS_TEMPLATE_ID = 'template_i6ntai5';  
        const EMAILJS_PUBLIC_KEY  = 'BX_diJSU4apzbpE69'; 

        emailjs.init(EMAILJS_PUBLIC_KEY);

        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          to_email    : email,
          to_name     : email.split('@')[0],
          from_name   : currentUser.name || 'A friend',
          group_name  : group.name,
          invite_url  : inviteUrl,
          expiry_days : '7'
        });

        closeMod('invite-modal');
        document.getElementById('invite-email').value = '';
        toast_('Invite email sent to ' + email + ' 📨', 'success');

    } catch(err) {
    // EmailJS rejects with {status, text} object, not a standard Error
    const msg = err?.text || err?.message || (typeof err === 'string' ? err : 'Email service error — check EmailJS dashboard.');
    toast_('Failed to send invite: ' + msg, 'error');
    
      } finally {
        btn.textContent = 'Send Invitation';
        btn.disabled = false;
      }
    }

    // ── Settle ────────────────────────────────────────────────────────────────
    function openSettleModal() {
      const myId = currentUser.id, myEmail = currentUser.email;
      const myKey = group.members.find(m => m === myId || m === myEmail) || myEmail;

      // Only include invites that are still pending — skip declined/rejected ones
      const activePendingInvites = pendingInvites.filter(i => i.status === 'pending');
      const inviteKeys = activePendingInvites.map(i => `invite:${i.invitedEmail || i.email}`);
      const allMemberKeys = [...group.members, ...inviteKeys];

      const opts = allMemberKeys.map(m => {
        const inv = activePendingInvites.find(i => `invite:${i.invitedEmail || i.email}` === m);
        const label = inv
          ? `${inv.invitedEmail || inv.email} (invited)`
          : memberName(m) + (m === myKey ? ' (You)' : '');
        return `<option value="${m}">${label}</option>`;
      }).join('');

      document.getElementById('s-from').innerHTML = opts;
      document.getElementById('s-to').innerHTML   = opts;
      document.getElementById('s-from').value = myKey;
      document.getElementById('s-amount').value = '';
      document.getElementById('s-note').value   = '';
      openMod('settle-modal');
    }

    async function quickSettle(from, to, amount) {
      const myId = currentUser.id, myEmail = currentUser.email;
      const id = _rid();
      const s = { id, groupId, paidBy: from, paidTo: to, amount: parseFloat(amount), note: 'Settled via app', createdBy: myId || myEmail, createdAt: Date.now() };
      try {
        await _fs().collection('settlements').doc(id).set(s);
        settlements.unshift(s);
        await writeSettlementLog('settlement_added', s, []);
        toast_('Payment recorded! ✓', 'success');
        renderHeader();
        renderSettle();
      } catch(err) { toast_('Error: ' + err.message, 'error'); }
    }

    async function recordSettlement() {
      const from   = document.getElementById('s-from').value;
      const to     = document.getElementById('s-to').value;
      const amount = parseFloat(document.getElementById('s-amount').value);
      const note   = document.getElementById('s-note').value.trim();
      if (from === to) { toast_("Payer and receiver can't be the same.", 'error'); return; }
      if (!amount || amount <= 0) { toast_('Enter a valid amount.', 'error'); return; }
      const myId = currentUser.id, myEmail = currentUser.email;
      const id = _rid();
      const s = { id, groupId, paidBy: from, paidTo: to, amount, note, createdBy: myId || myEmail, createdAt: Date.now() };
      try {
        await _fs().collection('settlements').doc(id).set(s);
        settlements.unshift(s);
        await writeSettlementLog('settlement_added', s, []);
        closeMod('settle-modal');
        toast_('Payment recorded! ✓', 'success');
        renderHeader();
        renderTab(currentTab);
      } catch(err) { toast_('Error: ' + err.message, 'error'); }
    }

    // ── Edit Group ────────────────────────────────────────────────────────────
    function openEditGroup() {
      document.getElementById('hdr-dd')?.classList.remove('open');
      document.getElementById('eg-name').value = group.name || '';
      document.getElementById('eg-desc').value = group.description || '';
      document.getElementById('eg-cat').value  = group.category || 'trip';
      openMod('edit-group-modal');
      setTimeout(() => document.getElementById('eg-name').focus(), 50);
    }

    async function saveEditGroup() {
      const name = document.getElementById('eg-name').value.trim();
      const desc = document.getElementById('eg-desc').value.trim();
      const cat  = document.getElementById('eg-cat').value;
      if (!name) { toast_('Group name is required.', 'error'); return; }
      try {
        // Build a changes diff before updating
        const changes = [];
        if (name !== group.name)                                    changes.push({ field: 'Name',        before: group.name        || '—', after: name });
        if (desc !== (group.description || ''))                     changes.push({ field: 'Description', before: group.description || '—', after: desc || '—' });
        if (cat  !== group.category)                                changes.push({ field: 'Category',    before: group.category    || '—', after: cat });

        await _fs().collection('groups').doc(groupId).update({ name, description: desc, category: cat, updatedAt: Date.now() });
        group.name = name; group.description = desc; group.category = cat;

        // Write a group log entry if anything changed
        if (changes.length) await writeGroupLog('group_edited', changes);

        closeMod('edit-group-modal');
        toast_('Group updated ✓', 'success');
        renderHeader();
        renderTab(currentTab);
      } catch(err) { toast_('Update failed: ' + err.message, 'error'); }
    }

    // ── Group Audit Log ───────────────────────────────────────────────────────
    async function writeGroupLog(action, changes) {
      const myId = currentUser.id, myEmail = currentUser.email;
      const logId = _rid();
      const log = {
        id:        logId,
        groupId,
        logType:   'group',            // distinguish from expense logs
        action,                        // e.g. 'group_edited'
        actorId:   myId || myEmail,
        actorName: currentUser.name || myEmail,
        timestamp: Date.now(),
        changes:   changes || []       // array of {field, before, after}
      };
      try {
        await _fs().collection('group_logs').doc(logId).set(log);
        groupLogs.unshift(log);
      } catch(e) { console.warn('Group log write failed:', e); }
    }

    // ── Settlement Audit Log ──────────────────────────────────────────────────
    async function writeSettlementLog(action, settlement, changes) {
      const myId = currentUser.id, myEmail = currentUser.email;
      const logId = _rid();
      const log = {
        id:           logId,
        groupId,
        logType:      'settlement',
        action,                         // 'settlement_added' | 'settlement_edited' | 'settlement_deleted'
        actorId:      myId || myEmail,
        actorName:    currentUser.name || myEmail,
        timestamp:    Date.now(),
        settlement:   { ...settlement }, // snapshot of settlement
        changes:      changes || []
      };
      try {
        await _fs().collection('settlement_logs').doc(logId).set(log);
        settlementLogs.unshift(log);
      } catch(e) { console.warn('Settlement log write failed:', e); }
    }

    // ── Edit Settlement ───────────────────────────────────────────────────────
    let editingSettlementId = null;

    function openEditSettlement(settlementId) {
      const s = settlements.find(x => x.id === settlementId);
      if (!s) return;
      editingSettlementId = settlementId;

      const myId = currentUser.id, myEmail = currentUser.email;
      const myKey = group.members.find(m => m === myId || m === myEmail) || myEmail;
      const allMemberKeys = [...group.members];
      const opts = allMemberKeys.map(m =>
        `<option value="${m}">${memberName(m)}${m === myKey ? ' (You)' : ''}</option>`
      ).join('');

      document.getElementById('es-from').innerHTML = opts;
      document.getElementById('es-to').innerHTML   = opts;
      document.getElementById('es-from').value  = s.paidBy;
      document.getElementById('es-to').value    = s.paidTo;
      document.getElementById('es-amount').value = s.amount;
      document.getElementById('es-note').value   = s.note || '';
      openMod('edit-settlement-modal');
    }

    async function saveEditSettlement() {
      const s = settlements.find(x => x.id === editingSettlementId);
      if (!s) return;

      const from   = document.getElementById('es-from').value;
      const to     = document.getElementById('es-to').value;
      const amount = parseFloat(document.getElementById('es-amount').value);
      const note   = document.getElementById('es-note').value.trim();

      if (from === to)         { toast_("Payer and receiver can't be the same.", 'error'); return; }
      if (!amount || amount <= 0) { toast_('Enter a valid amount.', 'error'); return; }

      // Build diff
      const changes = [];
      if (from   !== s.paidBy)              changes.push({ field: 'From',   before: memberName(s.paidBy), after: memberName(from) });
      if (to     !== s.paidTo)              changes.push({ field: 'To',     before: memberName(s.paidTo), after: memberName(to) });
      if (amount !== s.amount)              changes.push({ field: 'Amount', before: fmt(s.amount),        after: fmt(amount) });
      if (note   !== (s.note || ''))        changes.push({ field: 'Note',   before: s.note || '—',        after: note || '—' });

      try {
        await _fs().collection('settlements').doc(editingSettlementId).update({ paidBy: from, paidTo: to, amount, note, updatedAt: Date.now() });

        // Update local array
        const idx = settlements.findIndex(x => x.id === editingSettlementId);
        if (idx !== -1) { settlements[idx] = { ...settlements[idx], paidBy: from, paidTo: to, amount, note }; }

        if (changes.length) await writeSettlementLog('settlement_edited', settlements.find(x => x.id === editingSettlementId), changes);

        closeMod('edit-settlement-modal');
        toast_('Payment updated ✓', 'success');
        renderHeader();
        renderTab(currentTab);
      } catch(err) { toast_('Update failed: ' + err.message, 'error'); }
    }

    async function deleteSettlement(settlementId) {
      if (!confirm('Delete this recorded payment?')) return;
      const s = settlements.find(x => x.id === settlementId);
      try {
        await _fs().collection('settlements').doc(settlementId).delete();
        await writeSettlementLog('settlement_deleted', s, []);
        settlements = settlements.filter(x => x.id !== settlementId);
        toast_('Payment deleted.', 'success');
        renderHeader();
        renderTab(currentTab);
      } catch(err) { toast_('Delete failed: ' + err.message, 'error'); }
    }

    // ── Delete Group ──────────────────────────────────────────────────────────
    function confirmDeleteGroup() {
      document.getElementById('hdr-dd')?.classList.remove('open');
      if (!confirm('Delete "' + group.name + '"? This will remove all expenses permanently.')) return;
      doDeleteGroup();
    }

    async function doDeleteGroup() {
      try {
        const eSnap = await _fs().collection('expenses').where('groupId','==',groupId).get();
        const sSnap = await _fs().collection('settlements').where('groupId','==',groupId).get();
        const batch = _fs().batch();
        eSnap.docs.forEach(d => batch.delete(d.ref));
        sSnap.docs.forEach(d => batch.delete(d.ref));
        batch.delete(_fs().collection('groups').doc(groupId));
        await batch.commit();
        toast_('Group deleted.', 'info');
        setTimeout(() => { window.location.href = '../dashboard.html'; }, 1200);
      } catch(err) { toast_('Delete failed: ' + err.message, 'error'); }
    }

    // ── Minimal toast (fallback) ──────────────────────────────────────────────
    function toast_(msg, type) {
      try { if (typeof UI !== 'undefined' && UI.toast) { UI.toast(msg, type); return; } } catch(e) {}
      let c = document.getElementById('_tc');
      if (!c) {
        c = document.createElement('div');
        c.id = '_tc';
        c.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:320px';
        document.body.appendChild(c);
      }
      const t = document.createElement('div');
      const border = type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#6c63ff';
      t.style.cssText = `background:var(--bg2,#1e1e2e);border:1px solid ${border};color:var(--text,#fff);padding:12px 18px;border-radius:10px;font-size:0.88rem;box-shadow:0 4px 16px rgba(0,0,0,0.4);word-break:break-word`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }
  </script>
</body>
</html>
