<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group – SplitEase</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/landing.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .group-header-card {
      background: linear-gradient(135deg, rgba(124,106,247,0.12), rgba(74,222,128,0.06));
      border: 1px solid rgba(124,106,247,0.25);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .group-icon-big { font-size: 3rem; }
    .group-header-info { flex: 1; }
    .group-header-name { font-family: var(--font-display); font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
    .group-header-meta { color: var(--text-muted); font-size: 0.88rem; display: flex; gap: 16px; flex-wrap: wrap; }
    .group-header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .tabs { display: flex; gap: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; width: fit-content; }
    .tab-btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active { background: var(--accent); color: #fff; }

    .member-balance-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .member-balance-row:last-child { border-bottom: none; }
    .member-bal-bar-wrap { flex: 1; }
    .member-bal-bar { height: 4px; border-radius: 99px; background: var(--bg3); margin-top: 6px; }
    .member-bal-fill { height: 100%; border-radius: 99px; }

    .settle-txn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }
    .settle-txn .arrow { font-size: 1.2rem; color: var(--accent-bright); }
    .settle-txn-info { flex: 1; font-size: 0.88rem; }
    .settle-txn-amount { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }

    .split-type-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .split-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.15s;
      background: transparent;
      color: var(--text-muted);
    }
    .split-tab.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent-bright); }

    .split-member-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .split-member-name { flex: 1; font-size: 0.88rem; }
    .split-member-input { width: 100px; }
  </style>
</head>
<body class="app-layout">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <button class="btn-ghost btn-sm" onclick="history.back()" style="margin-bottom:16px">← Back</button>

    <div id="group-header"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('expenses')" data-tab="expenses">💸 Expenses</button>
      <button class="tab-btn" onclick="switchTab('balances')" data-tab="balances">⚖️ Balances</button>
      <button class="tab-btn" onclick="switchTab('members')" data-tab="members">👥 Members</button>
      <button class="tab-btn" onclick="switchTab('settle')" data-tab="settle">✓ Settle Up</button>
    </div>

    <div id="tab-expenses"></div>
    <div id="tab-balances" class="hidden"></div>
    <div id="tab-members" class="hidden"></div>
    <div id="tab-settle" class="hidden"></div>
  </main>

  <!-- Add Expense Modal -->
  <div class="modal-overlay" id="add-expense-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Add Expense</h2>
        <button class="modal-close" onclick="UI.closeModal('add-expense-modal')">&times;</button>
      </div>

      <div class="form-group">
        <label class="form-label">Description *</label>
        <input type="text" class="form-input" id="e-desc" placeholder="e.g. Hotel stay, Dinner, Uber..." />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Amount *</label>
          <input type="number" class="form-input" id="e-amount" placeholder="0" min="0" step="0.01" oninput="updateSplits()" />
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input" id="e-cat">
            <option value="food">🍽️ Food</option>
            <option value="transport">🚗 Transport</option>
            <option value="accommodation">🏨 Accommodation</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="entertainment">🎬 Entertainment</option>
            <option value="healthcare">💊 Healthcare</option>
            <option value="utilities">⚡ Utilities</option>
            <option value="other">📦 Other</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Paid By *</label>
          <select class="form-input" id="e-paidby"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" class="form-input" id="e-date" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <input type="text" class="form-input" id="e-notes" placeholder="Optional notes" />
      </div>

      <div class="form-group">
        <label class="form-label">Split Type</label>
        <div class="split-type-tabs">
          <button class="split-tab active" onclick="setSplitType('equal')" data-type="equal">Equal</button>
          <button class="split-tab" onclick="setSplitType('percentage')" data-type="percentage">%</button>
          <button class="split-tab" onclick="setSplitType('custom')" data-type="custom">Custom ₹</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Split Among</label>
        <div id="split-members-list"></div>
        <div id="split-total-display" style="font-size:0.82rem;color:var(--text-muted);margin-top:6px"></div>
      </div>

      <button class="btn-primary w-full" style="width:100%;margin-top:4px" onclick="saveExpense()">Add Expense</button>
    </div>
  </div>

  <!-- Invite Member Modal -->
  <div class="modal-overlay" id="invite-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h2 class="modal-title">Invite Member</h2>
        <button class="modal-close" onclick="UI.closeModal('invite-modal')">&times;</button>
      </div>
      <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:20px">
        Enter the email of the person you'd like to invite. They'll see this group when they sign in.
      </p>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="invite-email" placeholder="friend@gmail.com" />
      </div>
      <button class="btn-primary w-full" style="width:100%" onclick="sendInvite()">Send Invitation</button>
    </div>
  </div>

  <!-- Settle Modal -->
  <div class="modal-overlay" id="settle-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h2 class="modal-title">Record Payment</h2>
        <button class="modal-close" onclick="UI.closeModal('settle-modal')">&times;</button>
      </div>
      <div class="form-group">
        <label class="form-label">From (paid by)</label>
        <select class="form-input" id="s-from"></select>
      </div>
      <div class="form-group">
        <label class="form-label">To (paid to)</label>
        <select class="form-input" id="s-to"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Amount</label>
        <input type="number" class="form-input" id="s-amount" placeholder="0" min="0" step="0.01" />
      </div>
      <div class="form-group">
        <label class="form-label">Note (optional)</label>
        <input type="text" class="form-input" id="s-note" placeholder="e.g. via UPI, cash..." />
      </div>
      <button class="btn-primary w-full" style="width:100%" onclick="recordSettlement()">Record Payment</button>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    let currentUser, group, groupId;
    let splitType = 'equal';
    let selectedSplitMembers = new Set();
    let currentTab = 'expenses';

    document.addEventListener('DOMContentLoaded', () => {
      currentUser = Auth.requireAuth('../index.html');
      if (!currentUser) return;

      groupId = new URLSearchParams(location.search).get('id');
      if (!groupId) return window.location.href = 'groups.html';

      group = DB.getGroup(groupId);
      if (!group || !group.members.includes(currentUser.email)) {
        UI.toast('Group not found or access denied.', 'error');
        return window.location.href = 'groups.html';
      }

      Sidebar.init('groups');
      renderHeader();
      renderTab('expenses');
      document.getElementById('e-date').value = new Date().toISOString().split('T')[0];
    });

    // ── Header ────────────────────────────────────────────────────────────────
    function renderHeader() {
      const catIcons = { trip:'✈️', home:'🏠', event:'🎉', couple:'❤️', work:'💼', other:'📦' };
      const total = DB.calcGroupTotal(groupId);
      const bals  = DB.calcBalances(groupId);
      const myBal = bals[currentUser.email] || 0;
      document.title = `${group.name} – SplitEase`;

      document.getElementById('group-header').innerHTML = `
        <div class="group-header-card">
          <div class="group-icon-big">${catIcons[group.category] || '📦'}</div>
          <div class="group-header-info">
            <div class="group-header-name">${group.name}</div>
            <div class="group-header-meta">
              <span>👥 ${group.members.length} members</span>
              <span>💰 Total: ${UI.formatAmount(total, group.currency)}</span>
              <span>${group.currency}</span>
            </div>
            ${group.description ? `<p style="margin-top:8px;font-size:0.85rem;color:var(--text-muted)">${group.description}</p>` : ''}
            <div style="margin-top:12px;font-size:0.9rem">
              <span class="${myBal > 0 ? 'text-green' : myBal < 0 ? 'text-red' : 'text-muted'}" style="font-weight:600">
                ${myBal > 0 ? `You are owed ${UI.formatAmount(myBal, group.currency)}` : myBal < 0 ? `You owe ${UI.formatAmount(Math.abs(myBal), group.currency)}` : '✓ You are all settled up'}
              </span>
            </div>
          </div>
          <div class="group-header-actions">
            <button class="btn-primary btn-sm" onclick="openAddExpense()">+ Expense</button>
            <button class="btn-ghost btn-sm" onclick="openInvite()">Invite</button>
            ${group.createdBy === currentUser.email ? `<button class="btn-danger btn-sm" onclick="deleteGroupConfirm()">Delete</button>` : ''}
          </div>
        </div>
      `;
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      ['expenses','balances','members','settle'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
      });
      currentTab = tab;
      renderTab(tab);
    }

    function renderTab(tab) {
      if (tab === 'expenses') renderExpenses();
      else if (tab === 'balances') renderBalances();
      else if (tab === 'members') renderMembers();
      else if (tab === 'settle') renderSettle();
    }

    // ── Expenses Tab ──────────────────────────────────────────────────────────
    function renderExpenses() {
      const expenses = DB.getExpensesForGroup(groupId);
      const el = document.getElementById('tab-expenses');

      if (!expenses.length) {
        el.innerHTML = `
          <div class="card empty-state">
            <div class="empty-icon">💸</div>
            <h3>No expenses yet</h3>
            <p>Add your first expense to start tracking!</p>
            <button class="btn-primary" onclick="openAddExpense()">+ Add Expense</button>
          </div>`;
        return;
      }

      el.innerHTML = `
        <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
          <button class="btn-primary btn-sm" onclick="openAddExpense()">+ Add Expense</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div id="expense-list" style="padding:8px 20px"></div>
        </div>`;

      document.getElementById('expense-list').innerHTML = expenses.map(e => {
        const payer = UI.getUserDisplay(e.paidBy);
        const myShare = e.splits?.[currentUser.email] || 0;
        const canDelete = e.createdBy === currentUser.email || group.createdBy === currentUser.email;

        return `
          <div class="expense-item">
            <div class="expense-icon">${UI.categoryIcon(e.category)}</div>
            <div class="expense-info">
              <div class="expense-name">${e.description}</div>
              <div class="expense-meta">
                Paid by <strong>${payer.name}</strong> · ${UI.formatDate(e.date)} · ${e.splitType} split
              </div>
              ${e.notes ? `<div class="expense-meta">${e.notes}</div>` : ''}
            </div>
            <div style="text-align:right">
              <div class="expense-amount">${UI.formatAmount(e.amount, group.currency)}</div>
              ${myShare ? `<div style="font-size:0.78rem;color:var(--text-muted)">your share ${UI.formatAmount(myShare, group.currency)}</div>` : ''}
              ${canDelete ? `<button class="btn-danger btn-sm" style="margin-top:4px;padding:3px 8px;font-size:0.75rem" onclick="deleteExpense('${e.id}')">Delete</button>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    // ── Balances Tab ──────────────────────────────────────────────────────────
    function renderBalances() {
      const balances = DB.calcBalances(groupId);
      const users    = Auth.getUsers();
      const el       = document.getElementById('tab-balances');

      const maxAbs = Math.max(...Object.values(balances).map(Math.abs), 1);
      const rows = Object.entries(balances).map(([email, bal]) => {
        const u = users[email] || { name: email.split('@')[0], email };
        const pct = (Math.abs(bal) / maxAbs) * 100;
        const balClass = bal > 0 ? 'text-green' : bal < 0 ? 'text-red' : 'text-muted';
        const fill = bal > 0 ? 'var(--green)' : 'var(--red)';
        const label = bal > 0
          ? `gets back ${UI.formatAmount(bal, group.currency)}`
          : bal < 0
          ? `owes ${UI.formatAmount(Math.abs(bal), group.currency)}`
          : 'settled up';

        return `
          <div class="member-balance-row">
            ${UI.avatar(u)}
            <div class="member-bal-bar-wrap">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:0.9rem;font-weight:500">${u.name}</span>
                <span class="${balClass}" style="font-size:0.88rem;font-weight:600">${label}</span>
              </div>
              <div class="member-bal-bar">
                <div class="member-bal-fill" style="width:${pct}%;background:${fill}"></div>
              </div>
            </div>
          </div>`;
      }).join('');

      el.innerHTML = `
        <div class="card">
          <div style="margin-bottom:16px">
            <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;margin-bottom:4px">Member Balances</div>
            <div style="font-size:0.82rem;color:var(--text-muted)">Positive = owed money · Negative = owes money</div>
          </div>
          ${rows}
        </div>
        <div class="card" style="margin-top:16px">
          <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;margin-bottom:16px">Expense Breakdown</div>
          ${renderCategoryBreakdown()}
        </div>`;
    }

    function renderCategoryBreakdown() {
      const cats = DB.calcCategoryBreakdown(groupId);
      if (!Object.keys(cats).length) return '<div class="text-muted" style="font-size:0.88rem">No expenses yet.</div>';
      const total = Object.values(cats).reduce((s, v) => s + v, 0);
      return Object.entries(cats)
        .sort((a, b) => b[1] - a[1])
        .map(([cat, amt]) => {
          const pct = ((amt / total) * 100).toFixed(1);
          return `
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
              <span style="font-size:1.2rem;width:28px">${UI.categoryIcon(cat)}</span>
              <div style="flex:1">
                <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:4px">
                  <span style="text-transform:capitalize">${cat}</span>
                  <span>${UI.formatAmount(amt, group.currency)} (${pct}%)</span>
                </div>
                <div style="height:4px;background:var(--bg3);border-radius:99px">
                  <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:99px"></div>
                </div>
              </div>
            </div>`;
        }).join('');
    }

    // ── Members Tab ───────────────────────────────────────────────────────────
    function renderMembers() {
      const users = Auth.getUsers();
      const el = document.getElementById('tab-members');

      el.innerHTML = `
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div style="font-family:var(--font-display);font-weight:700">${group.members.length} Members</div>
            <button class="btn-primary btn-sm" onclick="openInvite()">+ Invite</button>
          </div>
          ${group.members.map(email => {
            const u = users[email] || { name: email.split('@')[0], email };
            const stats = DB.calcMemberStats(groupId, email);
            const isAdmin = group.createdBy === email;
            return `
              <div class="member-item">
                ${UI.avatar(u)}
                <div class="member-info">
                  <div class="member-name">${u.name || email} ${isAdmin ? '<span class="badge badge-accent">Admin</span>' : ''}</div>
                  <div class="member-email">${email}</div>
                </div>
                <div style="text-align:right;font-size:0.82rem;color:var(--text-muted)">
                  Paid ${UI.formatAmount(stats.totalPaid, group.currency)}
                </div>
              </div>`;
          }).join('')}
        </div>`;
    }

    // ── Settle Tab ────────────────────────────────────────────────────────────
    function renderSettle() {
      const settlements = DB.calcSettlements(groupId);
      const history = DB.getSettlementsForGroup(groupId);
      const users = Auth.getUsers();
      const el = document.getElementById('tab-settle');

      const txnHtml = settlements.length
        ? settlements.map(t => {
            const from = users[t.from] || { name: t.from.split('@')[0] };
            const to   = users[t.to]   || { name: t.to.split('@')[0] };
            const isMe = t.from === currentUser.email || t.to === currentUser.email;
            return `
              <div class="settle-txn" style="${isMe ? 'border:1px solid rgba(124,106,247,0.3)' : ''}">
                <span>${from.name}</span>
                <span class="arrow">→</span>
                <div class="settle-txn-info">pays <strong>${to.name}</strong></div>
                <div class="settle-txn-amount">${UI.formatAmount(t.amount, group.currency)}</div>
                ${isMe ? `<button class="btn-success btn-sm" onclick="quickSettle('${t.from}','${t.to}','${t.amount}')">Mark Paid</button>` : ''}
              </div>`;
          }).join('')
        : `<div class="empty-state"><div class="empty-icon">🎉</div><h3>All settled up!</h3><p>No outstanding balances in this group.</p></div>`;

      const histHtml = history.length
        ? history.map(s => {
            const from = users[s.paidBy] || { name: s.paidBy.split('@')[0] };
            const to   = users[s.paidTo] || { name: s.paidTo.split('@')[0] };
            return `
              <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.88rem">
                <span>✓</span>
                <span style="flex:1">${from.name} paid ${to.name} ${UI.formatAmount(s.amount, group.currency)}</span>
                <span style="color:var(--text-dim)">${UI.formatDate(s.date)}</span>
              </div>`;
          }).join('')
        : '<div style="color:var(--text-dim);font-size:0.85rem;padding:16px 0">No recorded payments yet.</div>';

      el.innerHTML = `
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div style="font-family:var(--font-display);font-weight:700">Suggested Payments</div>
            <button class="btn-ghost btn-sm" onclick="openSettleModal()">+ Record Payment</button>
          </div>
          ${txnHtml}
        </div>
        <div class="card" style="margin-top:16px">
          <div style="font-family:var(--font-display);font-weight:700;margin-bottom:12px">Payment History</div>
          ${histHtml}
        </div>`;
    }

    // ── Add Expense ───────────────────────────────────────────────────────────
    function openAddExpense() {
      group = DB.getGroup(groupId); // refresh
      splitType = 'equal';
      selectedSplitMembers = new Set(group.members);
      document.querySelectorAll('.split-tab').forEach(t => t.classList.toggle('active', t.dataset.type === 'equal'));

      const paidBySelect = document.getElementById('e-paidby');
      const users = Auth.getUsers();
      paidBySelect.innerHTML = group.members.map(email => {
        const u = users[email] || { name: email.split('@')[0] };
        return `<option value="${email}" ${email === currentUser.email ? 'selected' : ''}>${u.name || email}</option>`;
      }).join('');

      renderSplitMembers();
      UI.openModal('add-expense-modal');
      document.getElementById('e-desc').focus();
    }

    function setSplitType(type) {
      splitType = type;
      document.querySelectorAll('.split-tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
      renderSplitMembers();
    }

    function renderSplitMembers() {
      const users = Auth.getUsers();
      const amount = parseFloat(document.getElementById('e-amount').value) || 0;
      const count  = selectedSplitMembers.size || 1;
      const equalShare = amount / count;
      const el = document.getElementById('split-members-list');

      el.innerHTML = group.members.map(email => {
        const u = users[email] || { name: email.split('@')[0] };
        const checked = selectedSplitMembers.has(email);
        let inputHtml = '';

        if (splitType === 'equal') {
          inputHtml = `<span style="color:var(--text-muted);font-size:0.85rem">${checked ? UI.formatAmount(equalShare, group.currency) : '—'}</span>`;
        } else if (splitType === 'percentage') {
          inputHtml = `<input type="number" class="form-input split-member-input" data-email="${email}" placeholder="%" min="0" max="100" value="${checked ? Math.round(100/count) : 0}" oninput="updateSplits()" />`;
        } else {
          inputHtml = `<input type="number" class="form-input split-member-input" data-email="${email}" placeholder="0" min="0" step="0.01" value="${checked ? equalShare.toFixed(2) : 0}" oninput="updateSplits()" />`;
        }

        return `
          <div class="split-member-row">
            <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleSplitMember('${email}',this.checked)" style="accent-color:var(--accent)">
            ${UI.avatar(u, 'avatar-sm')}
            <span class="split-member-name">${u.name || email}</span>
            ${inputHtml}
          </div>`;
      }).join('');
      updateSplits();
    }

    function toggleSplitMember(email, checked) {
      if (checked) selectedSplitMembers.add(email);
      else selectedSplitMembers.delete(email);
      renderSplitMembers();
    }

    function updateSplits() {
      if (splitType === 'equal') {
        renderSplitMembers();
        return;
      }
      const amount = parseFloat(document.getElementById('e-amount').value) || 0;
      const inputs = document.querySelectorAll('.split-member-input');
      let total = 0;
      inputs.forEach(i => total += parseFloat(i.value) || 0);
      const disp = document.getElementById('split-total-display');
      if (splitType === 'percentage') disp.textContent = `Total: ${total.toFixed(1)}% (should be 100%)`;
      else disp.textContent = `Total split: ${UI.formatAmount(total, group.currency)} of ${UI.formatAmount(amount, group.currency)}`;
    }

    function buildSplitsObj() {
      const amount = parseFloat(document.getElementById('e-amount').value) || 0;
      const splits = {};

      if (splitType === 'equal') {
        const count = selectedSplitMembers.size;
        selectedSplitMembers.forEach(email => splits[email] = +(amount / count).toFixed(2));
      } else {
        document.querySelectorAll('.split-member-input').forEach(input => {
          const email = input.dataset.email;
          if (!selectedSplitMembers.has(email)) return;
          let val = parseFloat(input.value) || 0;
          if (splitType === 'percentage') val = +(amount * val / 100).toFixed(2);
          splits[email] = val;
        });
      }
      return splits;
    }

    function saveExpense() {
      const desc   = document.getElementById('e-desc').value.trim();
      const amount = parseFloat(document.getElementById('e-amount').value);
      const paidBy = document.getElementById('e-paidby').value;
      const cat    = document.getElementById('e-cat').value;
      const date   = document.getElementById('e-date').value;
      const notes  = document.getElementById('e-notes').value.trim();

      if (!desc) return UI.toast('Description is required.', 'error');
      if (!amount || amount <= 0) return UI.toast('Enter a valid amount.', 'error');
      if (!selectedSplitMembers.size) return UI.toast('Select at least one member to split with.', 'error');

      const splits = buildSplitsObj();
      DB.addExpense({ groupId, description: desc, amount, paidBy, category: cat, splitType, splits, date, notes, createdBy: currentUser.email });

      UI.closeModal('add-expense-modal');
      UI.toast('Expense added! 💸', 'success');
      document.getElementById('e-desc').value = '';
      document.getElementById('e-amount').value = '';
      renderHeader();
      if (currentTab === 'expenses') renderExpenses();
      else if (currentTab === 'balances') renderBalances();
      else if (currentTab === 'settle') renderSettle();
    }

    function deleteExpense(id) {
      UI.confirm('Delete this expense?', () => {
        DB.deleteExpense(id);
        UI.toast('Expense deleted.', 'info');
        renderHeader();
        renderTab(currentTab);
      });
    }

    // ── Invite ────────────────────────────────────────────────────────────────
    function openInvite() { UI.openModal('invite-modal'); document.getElementById('invite-email').focus(); }

    function sendInvite() {
      const email = document.getElementById('invite-email').value.trim().toLowerCase();
      if (!email || !email.includes('@')) return UI.toast('Enter a valid email.', 'error');
      if (group.members.includes(email)) return UI.toast('This person is already a member.', 'error');
      if (DB.hasInvite(groupId, email)) return UI.toast('Invitation already sent.', 'error');

      DB.createInvitation({ groupId, invitedEmail: email, invitedBy: currentUser.email });
      UI.closeModal('invite-modal');
      document.getElementById('invite-email').value = '';
      UI.toast(`Invitation sent to ${email} 📨`, 'success');
    }

    // ── Settle ────────────────────────────────────────────────────────────────
    function openSettleModal() {
      const users = Auth.getUsers();
      const opts  = group.members.map(email => {
        const u = users[email] || { name: email.split('@')[0] };
        return `<option value="${email}">${u.name || email}</option>`;
      }).join('');
      document.getElementById('s-from').innerHTML = opts;
      document.getElementById('s-to').innerHTML   = opts;
      document.getElementById('s-from').value = currentUser.email;
      document.getElementById('s-amount').value = '';
      document.getElementById('s-note').value = '';
      UI.openModal('settle-modal');
    }

    function quickSettle(from, to, amount) {
      DB.addSettlement({ groupId, paidBy: from, paidTo: to, amount: parseFloat(amount), note: 'Settled via app', createdBy: currentUser.email });
      UI.toast('Payment recorded! ✓', 'success');
      renderHeader();
      renderSettle();
    }

    function recordSettlement() {
      const from   = document.getElementById('s-from').value;
      const to     = document.getElementById('s-to').value;
      const amount = parseFloat(document.getElementById('s-amount').value);
      const note   = document.getElementById('s-note').value.trim();

      if (from === to) return UI.toast("Payer and receiver can't be the same.", 'error');
      if (!amount || amount <= 0) return UI.toast('Enter a valid amount.', 'error');

      DB.addSettlement({ groupId, paidBy: from, paidTo: to, amount, note, createdBy: currentUser.email });
      UI.closeModal('settle-modal');
      UI.toast('Payment recorded! ✓', 'success');
      renderHeader();
      renderTab(currentTab);
    }

    // ── Delete Group ──────────────────────────────────────────────────────────
    function deleteGroupConfirm() {
      UI.confirm(`Delete "${group.name}"? This will remove all expenses permanently.`, () => {
        DB.deleteGroup(groupId);
        UI.toast('Group deleted.', 'info');
        window.location.href = 'groups.html';
      });
    }
  </script>
</body>
</html>
