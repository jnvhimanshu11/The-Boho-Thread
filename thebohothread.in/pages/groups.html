<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Groups – SplitEase</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/landing.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .cat-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.8rem;
      gap: 6px;
    }
    .cat-option:hover { border-color: var(--accent); }
    .cat-option.selected { border-color: var(--accent); background: var(--accent-glow); color: var(--accent-bright); }
    .cat-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .groups-list { display: flex; flex-direction: column; gap: 12px; }
    .group-row {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .group-row:hover { border-color: var(--accent); }
    .group-row-icon { font-size: 2rem; flex-shrink: 0; }
    .group-row-info { flex: 1; min-width: 0; }
    .group-row-name { font-family: var(--font-display); font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
    .group-row-desc { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .group-row-stats { display: flex; gap: 16px; font-size: 0.8rem; color: var(--text-dim); }
    .group-row-balance { text-align: right; flex-shrink: 0; }
    .group-row-total { font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; }
    .group-row-bal { font-size: 0.82rem; margin-top: 2px; }
  </style>
</head>
<body class="app-layout">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px">
      <div class="page-header" style="margin-bottom:0">
        <h1 class="page-title">My Groups</h1>
        <p class="page-subtitle">Manage your shared expense groups</p>
      </div>
      <button class="btn-primary" onclick="openCreateGroup()">+ New Group</button>
    </div>

    <!-- Filter bar -->
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      <input type="text" class="form-input" id="search-input" placeholder="Search groups..." style="max-width:260px" oninput="renderGroups()" />
    </div>

    <div id="groups-list" class="groups-list"></div>
  </main>

  <!-- Create Group Modal -->
  <div class="modal-overlay" id="create-group-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Create New Group</h2>
        <button class="modal-close" onclick="UI.closeModal('create-group-modal')">&times;</button>
      </div>

      <div class="form-group">
        <label class="form-label">Group Name *</label>
        <input type="text" class="form-input" id="g-name" placeholder="e.g. Goa Trip 2025" maxlength="60" />
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" class="form-input" id="g-desc" placeholder="Optional description" />
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="cat-options" id="cat-options">
          <div class="cat-option selected" data-cat="trip" onclick="selectCat('trip')">✈️<span>Trip</span></div>
          <div class="cat-option" data-cat="home" onclick="selectCat('home')">🏠<span>Home</span></div>
          <div class="cat-option" data-cat="event" onclick="selectCat('event')">🎉<span>Event</span></div>
          <div class="cat-option" data-cat="couple" onclick="selectCat('couple')">❤️<span>Couple</span></div>
          <div class="cat-option" data-cat="work" onclick="selectCat('work')">💼<span>Work</span></div>
          <div class="cat-option" data-cat="other" onclick="selectCat('other')">📦<span>Other</span></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Currency</label>
        <select class="form-input" id="g-currency">
          <option value="INR">₹ Indian Rupee (INR)</option>
          <option value="USD">$ US Dollar (USD)</option>
          <option value="EUR">€ Euro (EUR)</option>
          <option value="GBP">£ British Pound (GBP)</option>
          <option value="AUD">A$ Australian Dollar (AUD)</option>
          <option value="JPY">¥ Japanese Yen (JPY)</option>
        </select>
      </div>

      <button class="btn-primary w-full" style="width:100%;margin-top:8px" onclick="createGroup()">Create Group</button>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    let currentUser;
    let selectedCat = 'trip';

    const CAT_ICONS = { trip:'✈️', home:'🏠', event:'🎉', couple:'❤️', work:'💼', other:'📦' };

    document.addEventListener('DOMContentLoaded', () => {
      currentUser = Auth.requireAuth('../index.html');
      if (!currentUser) return;
      Sidebar.init('groups');
      renderGroups();

      // Auto-open if ?new=1
      if (new URLSearchParams(location.search).get('new') === '1') {
        openCreateGroup();
      }
    });

    function renderGroups() {
      const query = (document.getElementById('search-input')?.value || '').toLowerCase();
      const groups = DB.getGroupsForUser(currentUser.email)
        .filter(g => !query || g.name.toLowerCase().includes(query) || (g.description || '').toLowerCase().includes(query))
        .sort((a, b) => b.createdAt - a.createdAt);

      const list = document.getElementById('groups-list');
      if (!groups.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">👥</div>
            <h3>${query ? 'No groups match your search' : 'No groups yet'}</h3>
            <p>${query ? 'Try a different search term' : 'Create your first group to start tracking shared expenses'}</p>
            ${!query ? '<button class="btn-primary" onclick="openCreateGroup()">+ Create Group</button>' : ''}
          </div>`;
        return;
      }

      list.innerHTML = groups.map(g => {
        const total   = DB.calcGroupTotal(g.id);
        const bals    = DB.calcBalances(g.id);
        const myBal   = bals[currentUser.email] || 0;
        const expenses = DB.getExpensesForGroup(g.id);
        const balClass = myBal > 0 ? 'text-green' : myBal < 0 ? 'text-red' : 'text-muted';
        const balText  = myBal > 0
          ? `You're owed ${UI.formatAmount(myBal, g.currency)}`
          : myBal < 0
          ? `You owe ${UI.formatAmount(Math.abs(myBal), g.currency)}`
          : '✓ Settled up';

        return `
          <div class="group-row" onclick="window.location.href='group-detail.html?id=${g.id}'">
            <div class="group-row-icon">${CAT_ICONS[g.category] || '📦'}</div>
            <div class="group-row-info">
              <div class="group-row-name">${g.name}</div>
              <div class="group-row-desc">${g.description || 'No description'}</div>
              <div class="group-row-stats">
                <span>👥 ${g.members.length} member${g.members.length !== 1 ? 's' : ''}</span>
                <span>💸 ${expenses.length} expense${expenses.length !== 1 ? 's' : ''}</span>
                <span>${g.currency}</span>
              </div>
            </div>
            <div class="group-row-balance">
              <div class="group-row-total">${UI.formatAmount(total, g.currency)}</div>
              <div class="group-row-bal ${balClass}">${balText}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function selectCat(cat) {
      selectedCat = cat;
      document.querySelectorAll('.cat-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.cat === cat);
      });
    }

    function openCreateGroup() {
      selectedCat = 'trip';
      document.querySelectorAll('.cat-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.cat === 'trip');
      });
      ['g-name','g-desc'].forEach(id => document.getElementById(id).value = '');
      UI.openModal('create-group-modal');
      document.getElementById('g-name').focus();
    }

    function createGroup() {
      const name = document.getElementById('g-name').value.trim();
      const desc = document.getElementById('g-desc').value.trim();
      const currency = document.getElementById('g-currency').value;

      if (!name) return UI.toast('Group name is required.', 'error');

      DB.createGroup({
        name,
        description: desc,
        currency,
        category: selectedCat,
        createdBy: currentUser.email,
      });

      UI.closeModal('create-group-modal');
      UI.toast(`"${name}" created! 🎉`, 'success');
      renderGroups();
    }
  </script>
</body>
</html>
