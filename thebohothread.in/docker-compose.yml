version: '3.8'

services:
  # MySQL Database (Production)
  db:
    image: mysql:8.0
    container_name: schoolwala-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: schoolwala_db
      MYSQL_USER: schoolwala
      MYSQL_PASSWORD: schoolwala123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schoolwala-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/schoolwala_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: schoolwala
      SPRING_DATASOURCE_PASSWORD: schoolwala123
      SCHOOLWALA_JWT_SECRET: SchoolWala_Super_Secret_JWT_Key_2024_Production_Grade
      SCHOOLWALA_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schoolwala-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
